<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="Arial, sans-serif">
  <rect width="960" height="480" fill="#1e1e2e" rx="12"/>
  <text x="480" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#cdd6f4">Networks and Protocols — IGCSE Computer Science</text>

  <!-- ══ NETWORK TOPOLOGY ══ -->
  <text x="200" y="56" text-anchor="middle" font-size="13" font-weight="bold" fill="#89b4fa">Packet-Switched Network</text>

  <!-- Devices -->
  <!-- Device A (source) -->
  <rect x="20" y="100" width="65" height="45" rx="6" fill="#89b4fa" fill-opacity="0.2" stroke="#89b4fa" stroke-width="2"/>
  <text x="52" y="122" text-anchor="middle" font-size="10" fill="#89b4fa">Device A</text>
  <text x="52" y="135" text-anchor="middle" font-size="9" fill="#a6adc8">(Source)</text>

  <!-- Router 1 -->
  <circle cx="160" cy="165" r="22" fill="#f9e2af" fill-opacity="0.2" stroke="#f9e2af" stroke-width="2"/>
  <text x="160" y="168" text-anchor="middle" font-size="9" fill="#f9e2af">Router 1</text>

  <!-- Router 2 -->
  <circle cx="280" cy="110" r="22" fill="#f9e2af" fill-opacity="0.2" stroke="#f9e2af" stroke-width="2"/>
  <text x="280" y="113" text-anchor="middle" font-size="9" fill="#f9e2af">Router 2</text>

  <!-- Router 3 -->
  <circle cx="280" cy="220" r="22" fill="#f9e2af" fill-opacity="0.2" stroke="#f9e2af" stroke-width="2"/>
  <text x="280" y="223" text-anchor="middle" font-size="9" fill="#f9e2af">Router 3</text>

  <!-- Router 4 -->
  <circle cx="380" cy="165" r="22" fill="#f9e2af" fill-opacity="0.2" stroke="#f9e2af" stroke-width="2"/>
  <text x="380" y="168" text-anchor="middle" font-size="9" fill="#f9e2af">Router 4</text>

  <!-- Device B (destination) -->
  <rect x="430" y="100" width="65" height="45" rx="6" fill="#a6e3a1" fill-opacity="0.2" stroke="#a6e3a1" stroke-width="2"/>
  <text x="462" y="122" text-anchor="middle" font-size="10" fill="#a6e3a1">Device B</text>
  <text x="462" y="135" text-anchor="middle" font-size="9" fill="#a6adc8">(Dest.)</text>

  <!-- Network links -->
  <line x1="85" y1="122" x2="138" y2="155" stroke="#6c7086" stroke-width="1.5"/>
  <line x1="138" y1="155" x2="138" y2="175" stroke="#6c7086" stroke-width="1.5"/>
  <line x1="160" y1="143" x2="258" y2="115" stroke="#6c7086" stroke-width="1.5"/>
  <line x1="160" y1="187" x2="258" y2="218" stroke="#6c7086" stroke-width="1.5"/>
  <line x1="302" y1="115" x2="358" y2="153" stroke="#6c7086" stroke-width="1.5"/>
  <line x1="302" y1="215" x2="358" y2="177" stroke="#6c7086" stroke-width="1.5"/>
  <line x1="280" y1="132" x2="280" y2="198" stroke="#6c7086" stroke-width="1.5"/>
  <line x1="402" y1="155" x2="430" y2="130" stroke="#6c7086" stroke-width="1.5"/>

  <!-- Packet route 1 (highlighted - top path) -->
  <line x1="85" y1="118" x2="138" y2="150" stroke="#f38ba8" stroke-width="2.5" stroke-dasharray="6,3"/>
  <line x1="160" y1="143" x2="258" y2="113" stroke="#f38ba8" stroke-width="2.5" stroke-dasharray="6,3"/>
  <line x1="302" y1="113" x2="358" y2="150" stroke="#f38ba8" stroke-width="2.5" stroke-dasharray="6,3"/>
  <line x1="402" y1="153" x2="430" y2="125" stroke="#f38ba8" stroke-width="2.5" stroke-dasharray="6,3"/>
  <text x="52" y="165" text-anchor="middle" font-size="9" fill="#f38ba8">Packet 1</text>

  <!-- Packet route 2 (highlighted - bottom path) -->
  <line x1="85" y1="128" x2="138" y2="160" stroke="#cba6f7" stroke-width="2.5" stroke-dasharray="4,4"/>
  <line x1="160" y1="187" x2="258" y2="220" stroke="#cba6f7" stroke-width="2.5" stroke-dasharray="4,4"/>
  <line x1="302" y1="217" x2="358" y2="178" stroke="#cba6f7" stroke-width="2.5" stroke-dasharray="4,4"/>
  <line x1="402" y1="158" x2="430" y2="132" stroke="#cba6f7" stroke-width="2.5" stroke-dasharray="4,4"/>
  <text x="52" y="180" text-anchor="middle" font-size="9" fill="#cba6f7">Packet 2</text>

  <text x="250" y="260" text-anchor="middle" font-size="10" fill="#a6adc8">Different packets take different routes → reassembled at destination</text>

  <!-- ══ TRANSMISSION TYPES ══ -->
  <text x="700" y="56" text-anchor="middle" font-size="13" font-weight="bold" fill="#cdd6f4">Data Transmission Methods</text>

  <!-- Serial -->
  <rect x="530" y="70" width="390" height="55" rx="6" fill="#181825"/>
  <text x="545" y="89" font-size="11" font-weight="bold" fill="#89b4fa">Serial</text>
  <text x="545" y="103" font-size="10" fill="#a6adc8">Device A ──bit──bit──bit──bit──► Device B  (one wire, one bit at a time)</text>
  <text x="545" y="118" font-size="9" fill="#a6e3a1">✓ Less interference ✓ Long distances ✓ Cheaper cable  ✗ Slower</text>

  <!-- Parallel -->
  <rect x="530" y="133" width="390" height="60" rx="6" fill="#181825"/>
  <text x="545" y="152" font-size="11" font-weight="bold" fill="#fab387">Parallel</text>
  <line x1="600" y1="160" x2="700" y2="160" stroke="#fab387" stroke-width="1.5"/>
  <line x1="600" y1="170" x2="700" y2="170" stroke="#fab387" stroke-width="1.5"/>
  <line x1="600" y1="180" x2="700" y2="180" stroke="#fab387" stroke-width="1.5"/>
  <text x="720" y="165" font-size="9" fill="#fab387">multiple wires, multiple bits at once</text>
  <text x="545" y="188" font-size="9" fill="#f38ba8">✓ Faster  ✗ Skew ✗ Interference ✗ Max ~5m ✗ Expensive</text>

  <!-- Direction types -->
  <rect x="530" y="205" width="390" height="105" rx="6" fill="#181825"/>
  <text x="545" y="224" font-size="11" font-weight="bold" fill="#a6e3a1">Simplex</text>
  <line x1="628" y1="220" x2="720" y2="220" stroke="#a6e3a1" stroke-width="2"/>
  <polygon points="718,215 730,220 718,225" fill="#a6e3a1"/>
  <text x="750" y="223" font-size="9" fill="#a6adc8">one direction only (keyboard)</text>

  <text x="545" y="248" font-size="11" font-weight="bold" fill="#f9e2af">Half-duplex</text>
  <line x1="645" y1="244" x2="720" y2="244" stroke="#f9e2af" stroke-width="2"/>
  <polygon points="718,239 730,244 718,249" fill="#f9e2af"/>
  <line x1="720" y1="255" x2="645" y2="255" stroke="#f9e2af" stroke-width="1.5" stroke-dasharray="5,3"/>
  <polygon points="647,250 635,255 647,260" fill="#f9e2af"/>
  <text x="750" y="252" font-size="9" fill="#a6adc8">both directions, not at same time (Wi-Fi)</text>

  <text x="545" y="278" font-size="11" font-weight="bold" fill="#f38ba8">Full-duplex</text>
  <line x1="648" y1="274" x2="720" y2="274" stroke="#f38ba8" stroke-width="2"/>
  <polygon points="718,269 730,274 718,279" fill="#f38ba8"/>
  <line x1="720" y1="282" x2="648" y2="282" stroke="#f38ba8" stroke-width="2"/>
  <polygon points="650,277 638,282 650,287" fill="#f38ba8"/>
  <text x="750" y="280" font-size="9" fill="#a6adc8">both directions at same time (phone call)</text>
  <text x="545" y="302" font-size="9" fill="#a6adc8">Ethernet: full-duplex serial  |  Wi-Fi: half-duplex</text>

  <!-- ══ PROTOCOLS TABLE ══ -->
  <rect x="20" y="295" width="500" height="170" rx="8" fill="#181825"/>
  <text x="270" y="315" text-anchor="middle" font-size="12" font-weight="bold" fill="#cdd6f4">Key Network Protocols</text>
  <rect x="25" y="322" width="490" height="22" rx="4" fill="#313244"/>
  <text x="115" y="337" text-anchor="middle" font-size="10" font-weight="bold" fill="#cdd6f4">Protocol</text>
  <text x="300" y="337" text-anchor="middle" font-size="10" font-weight="bold" fill="#cdd6f4">Full Name</text>
  <text x="460" y="337" text-anchor="middle" font-size="10" font-weight="bold" fill="#cdd6f4">Purpose</text>

  <text x="115" y="355" text-anchor="middle" font-size="10" fill="#89b4fa">TCP/IP</text>
  <text x="300" y="355" text-anchor="middle" font-size="10" fill="#a6adc8">Transmission Control Protocol</text>
  <text x="460" y="355" text-anchor="middle" font-size="10" fill="#a6adc8">Route packets, ensure delivery</text>

  <line x1="25" y1="362" x2="510" y2="362" stroke="#313244" stroke-width="1"/>
  <text x="115" y="378" text-anchor="middle" font-size="10" fill="#89b4fa">HTTP/HTTPS</text>
  <text x="300" y="378" text-anchor="middle" font-size="10" fill="#a6adc8">HyperText Transfer Protocol (Secure)</text>
  <text x="460" y="378" text-anchor="middle" font-size="10" fill="#a6adc8">Web page transfer</text>

  <line x1="25" y1="386" x2="510" y2="386" stroke="#313244" stroke-width="1"/>
  <text x="115" y="402" text-anchor="middle" font-size="10" fill="#89b4fa">FTP</text>
  <text x="300" y="402" text-anchor="middle" font-size="10" fill="#a6adc8">File Transfer Protocol</text>
  <text x="460" y="402" text-anchor="middle" font-size="10" fill="#a6adc8">File uploads/downloads</text>

  <line x1="25" y1="410" x2="510" y2="410" stroke="#313244" stroke-width="1"/>
  <text x="115" y="426" text-anchor="middle" font-size="10" fill="#89b4fa">SMTP</text>
  <text x="300" y="426" text-anchor="middle" font-size="10" fill="#a6adc8">Simple Mail Transfer Protocol</text>
  <text x="460" y="426" text-anchor="middle" font-size="10" fill="#a6adc8">Sending emails</text>

  <line x1="25" y1="434" x2="510" y2="434" stroke="#313244" stroke-width="1"/>
  <text x="115" y="450" text-anchor="middle" font-size="10" fill="#89b4fa">DNS</text>
  <text x="300" y="450" text-anchor="middle" font-size="10" fill="#a6adc8">Domain Name System</text>
  <text x="460" y="450" text-anchor="middle" font-size="10" fill="#a6adc8">Domain → IP address lookup</text>

  <!-- ══ ERROR DETECTION ══ -->
  <rect x="530" y="320" width="410" height="150" rx="8" fill="#181825"/>
  <text x="735" y="340" text-anchor="middle" font-size="12" font-weight="bold" fill="#cdd6f4">Error Detection</text>

  <text x="545" y="360" font-size="10" font-weight="bold" fill="#f9e2af">Parity check</text>
  <text x="545" y="374" font-size="9" fill="#a6adc8">Add parity bit to make total 1s odd/even</text>
  <text x="545" y="387" font-size="9" fill="#f38ba8">Detects single bit errors only</text>

  <text x="545" y="407" font-size="10" font-weight="bold" fill="#f9e2af">Checksum</text>
  <text x="545" y="421" font-size="9" fill="#a6adc8">Calculate value from data; compare after transmission</text>
  <text x="545" y="434" font-size="9" fill="#a6e3a1">Detects multiple bit errors</text>

  <text x="545" y="454" font-size="10" font-weight="bold" fill="#f9e2af">Echo check</text>
  <text x="545" y="468" font-size="9" fill="#a6adc8">Receiver sends data back; sender compares</text>
</svg>
