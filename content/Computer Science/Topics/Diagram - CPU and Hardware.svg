<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="Arial, sans-serif">
  <rect width="960" height="480" fill="#1e1e2e" rx="12"/>
  <text x="480" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#cdd6f4">CPU Architecture and Hardware — IGCSE Computer Science</text>

  <!-- ══ CPU INTERNAL STRUCTURE ══ -->
  <text x="270" y="56" text-anchor="middle" font-size="13" font-weight="bold" fill="#89b4fa">CPU Internal Structure</text>

  <!-- CPU outer box -->
  <rect x="30" y="68" width="490" height="290" rx="10" fill="#313244" stroke="#89b4fa" stroke-width="2.5"/>
  <text x="275" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#89b4fa">CPU</text>

  <!-- Control Unit -->
  <rect x="50" y="98" width="140" height="80" rx="6" fill="#f9e2af" fill-opacity="0.2" stroke="#f9e2af" stroke-width="2"/>
  <text x="120" y="123" text-anchor="middle" font-size="11" font-weight="bold" fill="#f9e2af">Control Unit</text>
  <text x="120" y="138" text-anchor="middle" font-size="9" fill="#a6adc8">• Controls FDE cycle</text>
  <text x="120" y="151" text-anchor="middle" font-size="9" fill="#a6adc8">• Manages data flow</text>
  <text x="120" y="164" text-anchor="middle" font-size="9" fill="#a6adc8">• Decodes instructions</text>

  <!-- ALU -->
  <rect x="215" y="98" width="140" height="80" rx="6" fill="#f38ba8" fill-opacity="0.2" stroke="#f38ba8" stroke-width="2"/>
  <text x="285" y="123" text-anchor="middle" font-size="11" font-weight="bold" fill="#f38ba8">ALU</text>
  <text x="285" y="138" text-anchor="middle" font-size="9" fill="#a6adc8">• Arithmetic: + - × ÷</text>
  <text x="285" y="151" text-anchor="middle" font-size="9" fill="#a6adc8">• Logic: AND OR NOT</text>
  <text x="285" y="164" text-anchor="middle" font-size="9" fill="#a6adc8">• Comparisons: &lt; &gt; =</text>

  <!-- Cache -->
  <rect x="378" y="98" width="125" height="80" rx="6" fill="#a6e3a1" fill-opacity="0.2" stroke="#a6e3a1" stroke-width="2"/>
  <text x="440" y="123" text-anchor="middle" font-size="11" font-weight="bold" fill="#a6e3a1">Cache</text>
  <text x="440" y="138" text-anchor="middle" font-size="9" fill="#a6adc8">Very fast memory</text>
  <text x="440" y="151" text-anchor="middle" font-size="9" fill="#a6adc8">Stores frequently</text>
  <text x="440" y="164" text-anchor="middle" font-size="9" fill="#a6adc8">used data/instructions</text>

  <!-- Registers -->
  <text x="270" y="200" text-anchor="middle" font-size="11" font-weight="bold" fill="#cba6f7">Key Registers</text>
  <!-- PC -->
  <rect x="50" y="210" width="90" height="50" rx="4" fill="#cba6f7" fill-opacity="0.2" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="95" y="228" text-anchor="middle" font-size="9" font-weight="bold" fill="#cba6f7">PC</text>
  <text x="95" y="241" text-anchor="middle" font-size="8" fill="#a6adc8">Program Counter</text>
  <text x="95" y="253" text-anchor="middle" font-size="8" fill="#a6adc8">Next instruction address</text>

  <!-- MAR -->
  <rect x="155" y="210" width="90" height="50" rx="4" fill="#cba6f7" fill-opacity="0.2" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="200" y="228" text-anchor="middle" font-size="9" font-weight="bold" fill="#cba6f7">MAR</text>
  <text x="200" y="241" text-anchor="middle" font-size="8" fill="#a6adc8">Mem. Address Reg.</text>
  <text x="200" y="253" text-anchor="middle" font-size="8" fill="#a6adc8">Address being read</text>

  <!-- MDR -->
  <rect x="260" y="210" width="90" height="50" rx="4" fill="#cba6f7" fill-opacity="0.2" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="305" y="228" text-anchor="middle" font-size="9" font-weight="bold" fill="#cba6f7">MDR</text>
  <text x="305" y="241" text-anchor="middle" font-size="8" fill="#a6adc8">Mem. Data Register</text>
  <text x="305" y="253" text-anchor="middle" font-size="8" fill="#a6adc8">Data from/to memory</text>

  <!-- CIR -->
  <rect x="365" y="210" width="90" height="50" rx="4" fill="#cba6f7" fill-opacity="0.2" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="410" y="228" text-anchor="middle" font-size="9" font-weight="bold" fill="#cba6f7">CIR</text>
  <text x="410" y="241" text-anchor="middle" font-size="8" fill="#a6adc8">Current Instr. Reg.</text>
  <text x="410" y="253" text-anchor="middle" font-size="8" fill="#a6adc8">Instruction decoding</text>

  <!-- ACC -->
  <rect x="50" y="278" width="90" height="50" rx="4" fill="#cba6f7" fill-opacity="0.2" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="95" y="296" text-anchor="middle" font-size="9" font-weight="bold" fill="#cba6f7">ACC</text>
  <text x="95" y="309" text-anchor="middle" font-size="8" fill="#a6adc8">Accumulator</text>
  <text x="95" y="321" text-anchor="middle" font-size="8" fill="#a6adc8">ALU result</text>

  <!-- Internal buses -->
  <line x1="190" y1="138" x2="215" y2="138" stroke="#f9e2af" stroke-width="2"/>
  <polygon points="213,134 223,138 213,142" fill="#f9e2af"/>
  <line x1="355" y1="138" x2="378" y2="138" stroke="#f38ba8" stroke-width="2"/>
  <polygon points="376,134 386,138 376,142" fill="#f38ba8"/>

  <!-- ══ FDE CYCLE ══ -->
  <text x="270" y="375" text-anchor="middle" font-size="11" font-weight="bold" fill="#cdd6f4">Fetch–Decode–Execute Cycle</text>

  <!-- Three boxes in a row -->
  <rect x="50" y="388" width="130" height="70" rx="6" fill="#89b4fa" fill-opacity="0.15" stroke="#89b4fa" stroke-width="2"/>
  <text x="115" y="408" text-anchor="middle" font-size="11" font-weight="bold" fill="#89b4fa">1. FETCH</text>
  <text x="115" y="422" text-anchor="middle" font-size="9" fill="#a6adc8">PC → MAR</text>
  <text x="115" y="435" text-anchor="middle" font-size="9" fill="#a6adc8">RAM → MDR → CIR</text>
  <text x="115" y="448" text-anchor="middle" font-size="9" fill="#a6adc8">PC increments</text>

  <line x1="180" y1="423" x2="210" y2="423" stroke="#a6adc8" stroke-width="2"/>
  <polygon points="208,418 220,423 208,428" fill="#a6adc8"/>

  <rect x="215" y="388" width="130" height="70" rx="6" fill="#f9e2af" fill-opacity="0.15" stroke="#f9e2af" stroke-width="2"/>
  <text x="280" y="408" text-anchor="middle" font-size="11" font-weight="bold" fill="#f9e2af">2. DECODE</text>
  <text x="280" y="422" text-anchor="middle" font-size="9" fill="#a6adc8">CU decodes CIR</text>
  <text x="280" y="435" text-anchor="middle" font-size="9" fill="#a6adc8">Identifies opcode</text>
  <text x="280" y="448" text-anchor="middle" font-size="9" fill="#a6adc8">and operand</text>

  <line x1="345" y1="423" x2="375" y2="423" stroke="#a6adc8" stroke-width="2"/>
  <polygon points="373,418 385,423 373,428" fill="#a6adc8"/>

  <rect x="380" y="388" width="130" height="70" rx="6" fill="#f38ba8" fill-opacity="0.15" stroke="#f38ba8" stroke-width="2"/>
  <text x="445" y="408" text-anchor="middle" font-size="11" font-weight="bold" fill="#f38ba8">3. EXECUTE</text>
  <text x="445" y="422" text-anchor="middle" font-size="9" fill="#a6adc8">ALU performs</text>
  <text x="445" y="435" text-anchor="middle" font-size="9" fill="#a6adc8">operation</text>
  <text x="445" y="448" text-anchor="middle" font-size="9" fill="#a6adc8">Result → ACC</text>

  <!-- Loop back arrow -->
  <path d="M510,423 C540,423 540,380 520,370 C500,360 100,360 80,370 C60,380 50,405 50,423" fill="none" stroke="#a6adc8" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="300" y="365" text-anchor="middle" font-size="9" fill="#a6adc8">← repeat for next instruction</text>

  <!-- ══ MEMORY HIERARCHY ══ -->
  <rect x="545" y="68" width="395" height="400" rx="8" fill="#181825"/>
  <text x="742" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="#cdd6f4">Memory and Storage Hierarchy</text>

  <!-- Pyramid -->
  <!-- Registers (top, fastest/smallest) -->
  <polygon points="742,100 700,130 784,130" fill="#f38ba8" fill-opacity="0.4" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="742" y="120" text-anchor="middle" font-size="9" fill="#1e1e2e" font-weight="bold">Registers</text>
  <text x="810" y="118" font-size="9" fill="#f38ba8">← Fastest, smallest</text>

  <!-- Cache -->
  <polygon points="742,132 688,165 796,165" fill="#fab387" fill-opacity="0.4" stroke="#fab387" stroke-width="1.5"/>
  <text x="742" y="152" text-anchor="middle" font-size="9" fill="#1e1e2e" font-weight="bold">Cache (L1/L2/L3)</text>
  <text x="810" y="152" font-size="9" fill="#fab387">← Very fast, small</text>

  <!-- RAM -->
  <polygon points="742,167 675,205 809,205" fill="#f9e2af" fill-opacity="0.4" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="742" y="190" text-anchor="middle" font-size="9" fill="#1e1e2e" font-weight="bold">RAM (Main memory)</text>
  <text x="815" y="188" font-size="9" fill="#f9e2af">← Fast, moderate size</text>

  <!-- SSD -->
  <polygon points="742,207 660,248 824,248" fill="#a6e3a1" fill-opacity="0.35" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="742" y="232" text-anchor="middle" font-size="9" fill="#1e1e2e" font-weight="bold">SSD (Secondary)</text>
  <text x="835" y="230" font-size="9" fill="#a6e3a1">← Fast, large</text>

  <!-- HDD -->
  <polygon points="742,250 645,295 839,295" fill="#89b4fa" fill-opacity="0.3" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="742" y="277" text-anchor="middle" font-size="9" fill="#1e1e2e" font-weight="bold">HDD (Secondary)</text>
  <text x="845" y="275" font-size="9" fill="#89b4fa">← Slower, very large</text>

  <!-- Optical/Cloud -->
  <polygon points="742,297 628,347 856,347" fill="#cba6f7" fill-opacity="0.25" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="742" y="326" text-anchor="middle" font-size="9" fill="#1e1e2e" font-weight="bold">Optical / Cloud / Tape</text>
  <text x="862" y="324" font-size="9" fill="#cba6f7">← Slowest, largest</text>

  <!-- Axis label -->
  <line x1="560" y1="100" x2="560" y2="347" stroke="#a6adc8" stroke-width="1.5"/>
  <text x="548" y="200" text-anchor="middle" font-size="10" fill="#a6adc8" transform="rotate(-90,548,220)">Speed / Cost per GB ↑</text>

  <!-- Performance factors table -->
  <rect x="555" y="365" width="375" height="95" rx="6" fill="#313244"/>
  <text x="742" y="383" text-anchor="middle" font-size="11" font-weight="bold" fill="#cdd6f4">Factors Affecting CPU Performance</text>
  <text x="565" y="400" font-size="10" fill="#f9e2af">Clock speed ↑</text>
  <text x="660" y="400" font-size="10" fill="#a6adc8">More cycles/sec → faster processing</text>
  <text x="565" y="416" font-size="10" fill="#f9e2af">More cores</text>
  <text x="660" y="416" font-size="10" fill="#a6adc8">Parallel execution → multiple tasks at once</text>
  <text x="565" y="432" font-size="10" fill="#f9e2af">Larger cache</text>
  <text x="660" y="432" font-size="10" fill="#a6adc8">Less RAM access needed → faster</text>
  <text x="565" y="448" font-size="10" fill="#f9e2af">More RAM</text>
  <text x="660" y="448" font-size="10" fill="#a6adc8">Less virtual memory use → faster</text>
</svg>
