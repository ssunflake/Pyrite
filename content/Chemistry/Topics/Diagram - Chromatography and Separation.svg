<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="Arial, sans-serif">
  <rect width="960" height="480" fill="#1e1e2e" rx="12"/>
  <text x="480" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#cdd6f4">Separation Techniques and Chromatography — IGCSE Chemistry</text>

  <!-- ══ PAPER CHROMATOGRAPHY ══ -->
  <text x="160" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#89b4fa">Paper Chromatography</text>

  <!-- Chromatogram -->
  <rect x="20" y="68" width="280" height="300" rx="6" fill="#181825"/>

  <!-- Paper background -->
  <rect x="40" y="85" width="240" height="265" rx="4" fill="#f9e2af" fill-opacity="0.08" stroke="#f9e2af" stroke-width="1.5"/>

  <!-- Solvent level (bottom) -->
  <rect x="40" y="330" width="240" height="20" rx="2" fill="#89b4fa" fill-opacity="0.2"/>
  <text x="160" y="345" text-anchor="middle" font-size="9" fill="#89b4fa">solvent level (start)</text>

  <!-- Baseline (pencil) -->
  <line x1="40" y1="310" x2="280" y2="310" stroke="#f9e2af" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="22" y="313" text-anchor="end" font-size="9" fill="#f9e2af">baseline</text>

  <!-- Solvent front -->
  <line x1="40" y1="100" x2="280" y2="100" stroke="#89b4fa" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="22" y="103" text-anchor="end" font-size="9" fill="#89b4fa">solvent front</text>

  <!-- Distance from baseline to solvent front -->
  <line x1="290" y1="310" x2="290" y2="100" stroke="#a6adc8" stroke-width="1.5"/>
  <text x="308" y="210" text-anchor="start" font-size="9" fill="#a6adc8">distance</text>
  <text x="308" y="222" text-anchor="start" font-size="9" fill="#a6adc8">solvent</text>
  <text x="308" y="234" text-anchor="start" font-size="9" fill="#a6adc8">travelled</text>

  <!-- Sample spots on baseline (mixture + 2 known) -->
  <circle cx="80" cy="310" r="6" fill="#f38ba8" fill-opacity="0.7"/>
  <text x="80" y="327" text-anchor="middle" font-size="9" fill="#f38ba8">mix</text>

  <circle cx="160" cy="310" r="5" fill="#a6e3a1" fill-opacity="0.7"/>
  <text x="160" y="327" text-anchor="middle" font-size="9" fill="#a6e3a1">std A</text>

  <circle cx="230" cy="310" r="5" fill="#fab387" fill-opacity="0.7"/>
  <text x="230" y="327" text-anchor="middle" font-size="9" fill="#fab387">std B</text>

  <!-- Separated spots: mixture had 3 components -->
  <!-- Component 1 (travels far) -->
  <circle cx="80" cy="140" r="8" fill="#f38ba8" fill-opacity="0.7"/>
  <line x1="80" y1="310" x2="80" y2="148" stroke="#f38ba8" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Component 2 (middle) -->
  <circle cx="80" cy="210" r="8" fill="#f9e2af" fill-opacity="0.7"/>

  <!-- Component 3 (barely moves) -->
  <circle cx="80" cy="280" r="8" fill="#cba6f7" fill-opacity="0.7"/>

  <!-- Standard A spot (at same position as component 1) -->
  <circle cx="160" cy="140" r="7" fill="#a6e3a1" fill-opacity="0.7"/>
  <line x1="80" y1="140" x2="160" y2="140" stroke="#a6e3a1" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="222" y="137" font-size="9" fill="#a6e3a1">← same level = same compound</text>

  <!-- Standard B spot -->
  <circle cx="230" cy="210" r="7" fill="#fab387" fill-opacity="0.7"/>
  <line x1="80" y1="210" x2="230" y2="210" stroke="#fab387" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Rf annotations -->
  <line x1="45" y1="310" x2="45" y2="140" stroke="#f38ba8" stroke-width="1.5"/>
  <polygon points="41,142 49,142 45,138" fill="#f38ba8"/>
  <text x="28" y="226" text-anchor="middle" font-size="9" fill="#f38ba8">dist.</text>
  <text x="28" y="237" text-anchor="middle" font-size="9" fill="#f38ba8">spot</text>
  <text x="28" y="248" text-anchor="middle" font-size="9" fill="#f38ba8">moved</text>

  <!-- ══ RF VALUE CALCULATION ══ -->
  <rect x="20" y="380" width="280" height="90" rx="6" fill="#313244"/>
  <text x="160" y="400" text-anchor="middle" font-size="12" font-weight="bold" fill="#f9e2af">Rᶠ Value</text>
  <text x="160" y="420" text-anchor="middle" font-size="13" fill="#f9e2af">Rᶠ = distance moved by spot</text>
  <text x="160" y="437" text-anchor="middle" font-size="13" fill="#f9e2af">         distance moved by solvent</text>
  <text x="160" y="455" text-anchor="middle" font-size="10" fill="#a6adc8">Always between 0 and 1</text>
  <text x="160" y="468" text-anchor="middle" font-size="10" fill="#a6adc8">Same Rᶠ in same solvent = same compound</text>

  <!-- ══ SEPARATION TECHNIQUES ══ -->
  <text x="640" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#cdd6f4">Separation Techniques Summary</text>

  <rect x="310" y="68" width="635" height="400" rx="8" fill="#181825"/>

  <!-- Header -->
  <rect x="315" y="75" width="625" height="22" rx="4" fill="#313244"/>
  <text x="435" y="90" text-anchor="middle" font-size="10" font-weight="bold" fill="#cdd6f4">Technique</text>
  <text x="595" y="90" text-anchor="middle" font-size="10" font-weight="bold" fill="#cdd6f4">Separates</text>
  <text x="820" y="90" text-anchor="middle" font-size="10" font-weight="bold" fill="#cdd6f4">Key principle</text>

  <!-- Rows -->
  <line x1="320" y1="97" x2="935" y2="97" stroke="#313244" stroke-width="1"/>

  <text x="435" y="114" text-anchor="middle" font-size="10" fill="#89b4fa">Filtration</text>
  <text x="595" y="114" text-anchor="middle" font-size="10" fill="#a6adc8">Insoluble solid from liquid</text>
  <text x="820" y="114" text-anchor="middle" font-size="10" fill="#a6adc8">Particle size — large particles retained by filter</text>
  <line x1="320" y1="122" x2="935" y2="122" stroke="#313244" stroke-width="1"/>

  <text x="435" y="139" text-anchor="middle" font-size="10" fill="#a6e3a1">Evaporation</text>
  <text x="595" y="139" text-anchor="middle" font-size="10" fill="#a6adc8">Dissolved solid from solution</text>
  <text x="820" y="139" text-anchor="middle" font-size="10" fill="#a6adc8">Heat drives off solvent; solid remains</text>
  <line x1="320" y1="147" x2="935" y2="147" stroke="#313244" stroke-width="1"/>

  <text x="435" y="164" text-anchor="middle" font-size="10" fill="#a6e3a1">Crystallisation</text>
  <text x="595" y="164" text-anchor="middle" font-size="10" fill="#a6adc8">Pure crystals from solution</text>
  <text x="820" y="164" text-anchor="middle" font-size="10" fill="#a6adc8">Saturate, cool slowly; impurities remain in solution</text>
  <line x1="320" y1="172" x2="935" y2="172" stroke="#313244" stroke-width="1"/>

  <text x="435" y="189" text-anchor="middle" font-size="10" fill="#f38ba8">Simple distillation</text>
  <text x="595" y="189" text-anchor="middle" font-size="10" fill="#a6adc8">Solvent from solution</text>
  <text x="820" y="189" text-anchor="middle" font-size="10" fill="#a6adc8">Liquid boils, condenses; dissolved solid stays</text>
  <line x1="320" y1="197" x2="935" y2="197" stroke="#313244" stroke-width="1"/>

  <text x="435" y="214" text-anchor="middle" font-size="10" fill="#f38ba8">Fractional distillation</text>
  <text x="595" y="214" text-anchor="middle" font-size="10" fill="#a6adc8">Liquids with close boiling points</text>
  <text x="820" y="214" text-anchor="middle" font-size="10" fill="#a6adc8">Fractionating column; multiple condensation/evaporation</text>
  <line x1="320" y1="222" x2="935" y2="222" stroke="#313244" stroke-width="1"/>

  <text x="435" y="239" text-anchor="middle" font-size="10" fill="#89b4fa">Paper chromatography</text>
  <text x="595" y="239" text-anchor="middle" font-size="10" fill="#a6adc8">Components of dissolved mix</text>
  <text x="820" y="239" text-anchor="middle" font-size="10" fill="#a6adc8">Different Rᶠ values in solvent; adsorption on paper</text>
  <line x1="320" y1="247" x2="935" y2="247" stroke="#313244" stroke-width="1"/>

  <text x="435" y="264" text-anchor="middle" font-size="10" fill="#fab387">Separating funnel</text>
  <text x="595" y="264" text-anchor="middle" font-size="10" fill="#a6adc8">Immiscible liquids</text>
  <text x="820" y="264" text-anchor="middle" font-size="10" fill="#a6adc8">Density difference; layers separate; run off lower layer</text>

  <!-- Distillation apparatus diagram (simple) -->
  <text x="627" y="298" text-anchor="middle" font-size="11" font-weight="bold" fill="#cdd6f4">Simple Distillation Apparatus</text>

  <!-- Flask -->
  <ellipse cx="395" cy="400" rx="45" ry="35" fill="#313244" stroke="#f9e2af" stroke-width="2"/>
  <text x="395" y="403" text-anchor="middle" font-size="10" fill="#f9e2af">Flask</text>
  <!-- Neck of flask -->
  <line x1="418" y1="372" x2="448" y2="365" stroke="#f9e2af" stroke-width="2"/>
  <!-- Thermometer -->
  <rect x="444" y="330" width="8" height="45" rx="3" fill="#89b4fa" fill-opacity="0.5" stroke="#89b4fa" stroke-width="1"/>
  <text x="460" y="350" font-size="9" fill="#89b4fa">thermometer</text>
  <!-- Condenser tube -->
  <rect x="455" y="365" width="80" height="18" rx="4" fill="#313244" stroke="#89b4fa" stroke-width="2"/>
  <text x="495" y="377" text-anchor="middle" font-size="9" fill="#89b4fa">condenser</text>
  <!-- Cooling water jacket -->
  <rect x="450" y="358" width="90" height="32" rx="6" fill="none" stroke="#89b4fa" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="495" y="402" text-anchor="middle" font-size="8" fill="#89b4fa">cold water in/out</text>
  <!-- Collection flask -->
  <ellipse cx="578" cy="420" rx="30" ry="22" fill="#313244" stroke="#a6e3a1" stroke-width="2"/>
  <text x="578" y="423" text-anchor="middle" font-size="9" fill="#a6e3a1">pure</text>
  <text x="578" y="435" text-anchor="middle" font-size="9" fill="#a6e3a1">distillate</text>
  <!-- connecting tube -->
  <line x1="535" y1="374" x2="555" y2="400" stroke="#a6e3a1" stroke-width="2"/>
  <!-- Heat source -->
  <text x="395" y="445" text-anchor="middle" font-size="16" fill="#f38ba8">🔥</text>
  <text x="395" y="460" text-anchor="middle" font-size="9" fill="#f38ba8">heat</text>

  <!-- Purity test box -->
  <rect x="640" y="310" width="285" height="155" rx="6" fill="#313244"/>
  <text x="782" y="330" text-anchor="middle" font-size="11" font-weight="bold" fill="#cdd6f4">Testing for Purity</text>
  <text x="650" y="350" font-size="10" fill="#f9e2af">Melting point test (solids):</text>
  <text x="650" y="365" font-size="9" fill="#a6adc8">  Pure: sharp m.p. at exact temperature</text>
  <text x="650" y="380" font-size="9" fill="#f38ba8">  Impure: range of temps; lower than expected</text>
  <text x="650" y="400" font-size="10" fill="#f9e2af">Boiling point test (liquids):</text>
  <text x="650" y="415" font-size="9" fill="#a6adc8">  Pure: boils at exact constant temperature</text>
  <text x="650" y="430" font-size="9" fill="#f38ba8">  Impure: boils at higher temp over a range</text>
  <text x="650" y="450" font-size="10" fill="#a6e3a1">Chromatography:</text>
  <text x="650" y="465" font-size="9" fill="#a6adc8">  One spot = pure; multiple spots = mixture</text>
</svg>
