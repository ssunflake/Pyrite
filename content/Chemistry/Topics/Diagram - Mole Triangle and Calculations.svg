<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="Arial, sans-serif">
  <rect width="960" height="480" fill="#1e1e2e" rx="12"/>
  <text x="480" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#cdd6f4">Mole Calculations — IGCSE Chemistry</text>

  <!-- ══ MOLE TRIANGLE 1: mass/Mr ══ -->
  <text x="150" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#f9e2af">Mass / Moles / Mr</text>
  <polygon points="150,220 50,380 250,380" fill="#f9e2af" fill-opacity="0.12" stroke="#f9e2af" stroke-width="2.5"/>
  <!-- Top: n (moles) -->
  <rect x="115" y="200" width="70" height="34" rx="6" fill="#f9e2af" fill-opacity="0.3"/>
  <text x="150" y="223" text-anchor="middle" font-size="15" font-weight="bold" fill="#f9e2af">n</text>
  <!-- Bottom left: m (mass) -->
  <rect x="50" y="352" width="70" height="34" rx="6" fill="#f38ba8" fill-opacity="0.3"/>
  <text x="85" y="374" text-anchor="middle" font-size="14" font-weight="bold" fill="#f38ba8">m (g)</text>
  <!-- Bottom right: Mr -->
  <rect x="180" y="352" width="70" height="34" rx="6" fill="#89b4fa" fill-opacity="0.3"/>
  <text x="215" y="374" text-anchor="middle" font-size="14" font-weight="bold" fill="#89b4fa">Mr</text>
  <!-- Division line -->
  <line x1="50" y1="300" x2="250" y2="300" stroke="#f9e2af" stroke-width="2"/>
  <!-- Formulas below -->
  <rect x="20" y="395" width="260" height="70" rx="6" fill="#181825"/>
  <text x="150" y="413" text-anchor="middle" font-size="11" fill="#cdd6f4" font-weight="bold">Cover the one you want:</text>
  <text x="150" y="430" text-anchor="middle" font-size="13" fill="#f9e2af">n = m ÷ Mr</text>
  <text x="150" y="448" text-anchor="middle" font-size="13" fill="#f38ba8">m = n × Mr</text>
  <text x="150" y="466" text-anchor="middle" font-size="13" fill="#89b4fa">Mr = m ÷ n</text>

  <!-- ══ MOLE TRIANGLE 2: gas volume ══ -->
  <text x="480" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#a6e3a1">Gas Volume (r.t.p.)</text>
  <polygon points="480,220 380,380 580,380" fill="#a6e3a1" fill-opacity="0.12" stroke="#a6e3a1" stroke-width="2.5"/>
  <rect x="445" y="200" width="70" height="34" rx="6" fill="#a6e3a1" fill-opacity="0.3"/>
  <text x="480" y="223" text-anchor="middle" font-size="15" font-weight="bold" fill="#a6e3a1">n</text>
  <rect x="380" y="352" width="70" height="34" rx="6" fill="#fab387" fill-opacity="0.3"/>
  <text x="415" y="374" text-anchor="middle" font-size="13" font-weight="bold" fill="#fab387">V (dm³)</text>
  <rect x="510" y="352" width="70" height="34" rx="6" fill="#cba6f7" fill-opacity="0.3"/>
  <text x="545" y="374" text-anchor="middle" font-size="13" font-weight="bold" fill="#cba6f7">24</text>
  <line x1="380" y1="300" x2="580" y2="300" stroke="#a6e3a1" stroke-width="2"/>
  <rect x="350" y="395" width="260" height="70" rx="6" fill="#181825"/>
  <text x="480" y="413" text-anchor="middle" font-size="11" fill="#cdd6f4" font-weight="bold">At r.t.p. (25°C, 1 atm):</text>
  <text x="480" y="430" text-anchor="middle" font-size="13" fill="#a6e3a1">n = V ÷ 24</text>
  <text x="480" y="448" text-anchor="middle" font-size="13" fill="#fab387">V = n × 24</text>
  <text x="480" y="466" text-anchor="middle" font-size="11" fill="#a6adc8">V in dm³; 1 dm³ = 1000 cm³</text>

  <!-- ══ MOLE TRIANGLE 3: concentration ══ -->
  <text x="810" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#f38ba8">Solution Concentration</text>
  <polygon points="810,220 710,380 910,380" fill="#f38ba8" fill-opacity="0.12" stroke="#f38ba8" stroke-width="2.5"/>
  <rect x="775" y="200" width="70" height="34" rx="6" fill="#f38ba8" fill-opacity="0.3"/>
  <text x="810" y="223" text-anchor="middle" font-size="15" font-weight="bold" fill="#f38ba8">n</text>
  <rect x="710" y="352" width="70" height="34" rx="6" fill="#89b4fa" fill-opacity="0.3"/>
  <text x="745" y="374" text-anchor="middle" font-size="13" font-weight="bold" fill="#89b4fa">c (mol/dm³)</text>
  <rect x="840" y="352" width="70" height="34" rx="6" fill="#a6e3a1" fill-opacity="0.3"/>
  <text x="875" y="374" text-anchor="middle" font-size="13" font-weight="bold" fill="#a6e3a1">V (dm³)</text>
  <line x1="710" y1="300" x2="910" y2="300" stroke="#f38ba8" stroke-width="2"/>
  <rect x="680" y="395" width="260" height="70" rx="6" fill="#181825"/>
  <text x="810" y="413" text-anchor="middle" font-size="11" fill="#cdd6f4" font-weight="bold">Solution calculations:</text>
  <text x="810" y="430" text-anchor="middle" font-size="13" fill="#f38ba8">n = c × V</text>
  <text x="810" y="448" text-anchor="middle" font-size="13" fill="#89b4fa">c = n ÷ V</text>
  <text x="810" y="466" text-anchor="middle" font-size="13" fill="#a6e3a1">V = n ÷ c</text>

  <!-- ══ Central "MOLE HUB" ══ -->
  <rect x="385" y="65" width="190" height="115" rx="10" fill="#313244" stroke="#f9e2af" stroke-width="2"/>
  <text x="480" y="87" text-anchor="middle" font-size="12" font-weight="bold" fill="#f9e2af">THE MOLE HUB</text>
  <text x="480" y="104" text-anchor="middle" font-size="11" fill="#cdd6f4">Nₐ = 6.02 × 10²³ mol⁻¹</text>
  <text x="480" y="121" text-anchor="middle" font-size="11" fill="#a6adc8">particles = n × Nₐ</text>
  <text x="480" y="138" text-anchor="middle" font-size="11" fill="#a6adc8">n = particles ÷ Nₐ</text>
  <text x="480" y="155" text-anchor="middle" font-size="10" fill="#a6adc8">Convert cm³ → dm³: ÷ 1000</text>
  <text x="480" y="168" text-anchor="middle" font-size="10" fill="#a6adc8">1 mol gas at r.t.p. = 24 dm³</text>

  <!-- Connecting arrows from hub to triangles -->
  <line x1="390" y1="120" x2="230" y2="250" stroke="#6c7086" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="480" y1="180" x2="480" y2="200" stroke="#6c7086" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="570" y1="120" x2="730" y2="250" stroke="#6c7086" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>
