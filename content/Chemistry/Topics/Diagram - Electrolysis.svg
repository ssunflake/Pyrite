<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="Arial, sans-serif">
  <rect width="960" height="480" fill="#1e1e2e" rx="12"/>
  <text x="480" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#cdd6f4">Electrolysis — IGCSE Chemistry</text>

  <!-- ══ LEFT: General electrolysis cell ══ -->
  <text x="220" y="56" text-anchor="middle" font-size="13" font-weight="bold" fill="#89b4fa">Electrolytic Cell</text>

  <!-- Battery / power supply -->
  <rect x="155" y="65" width="130" height="40" rx="6" fill="#313244" stroke="#f9e2af" stroke-width="2"/>
  <text x="220" y="90" text-anchor="middle" font-size="12" fill="#f9e2af">⚡ Power Supply</text>
  <!-- + and - terminals -->
  <text x="165" y="108" text-anchor="middle" font-size="14" fill="#f38ba8">−</text>
  <text x="275" y="108" text-anchor="middle" font-size="14" fill="#a6e3a1">+</text>

  <!-- Wires -->
  <line x1="165" y1="105" x2="120" y2="105" stroke="#f38ba8" stroke-width="3"/>
  <line x1="120" y1="105" x2="120" y2="160" stroke="#f38ba8" stroke-width="3"/>
  <line x1="275" y1="105" x2="320" y2="105" stroke="#a6e3a1" stroke-width="3"/>
  <line x1="320" y1="105" x2="320" y2="160" stroke="#a6e3a1" stroke-width="3"/>

  <!-- Beaker -->
  <rect x="90" y="160" width="260" height="200" rx="4" fill="#89b4fa" fill-opacity="0.08" stroke="#6c7086" stroke-width="2"/>

  <!-- Electrolyte solution fill -->
  <rect x="91" y="200" width="258" height="158" rx="4" fill="#89b4fa" fill-opacity="0.12"/>
  <text x="220" y="300" text-anchor="middle" font-size="11" fill="#89b4fa">Electrolyte</text>
  <text x="220" y="314" text-anchor="middle" font-size="10" fill="#a6adc8">(ions free to move)</text>

  <!-- Cathode (left, negative) -->
  <rect x="108" y="160" width="20" height="190" rx="3" fill="#f38ba8" fill-opacity="0.4" stroke="#f38ba8" stroke-width="2"/>
  <text x="118" y="155" text-anchor="middle" font-size="11" fill="#f38ba8">−</text>
  <text x="65" y="205" text-anchor="end" font-size="11" font-weight="bold" fill="#f38ba8">CATHODE</text>
  <text x="65" y="220" text-anchor="end" font-size="10" fill="#a6adc8">Reduction</text>
  <text x="65" y="233" text-anchor="end" font-size="10" fill="#a6adc8">Cations → here</text>
  <text x="65" y="246" text-anchor="end" font-size="10" fill="#a6adc8">Gain electrons</text>

  <!-- Bubbles at cathode (H2) -->
  <circle cx="132" cy="350" r="5" fill="#f38ba8" fill-opacity="0.5"/>
  <circle cx="125" cy="335" r="4" fill="#f38ba8" fill-opacity="0.5"/>
  <circle cx="136" cy="320" r="3" fill="#f38ba8" fill-opacity="0.5"/>
  <text x="145" y="360" font-size="9" fill="#f38ba8">H₂ or metal</text>

  <!-- Anode (right, positive) -->
  <rect x="312" y="160" width="20" height="190" rx="3" fill="#a6e3a1" fill-opacity="0.4" stroke="#a6e3a1" stroke-width="2"/>
  <text x="322" y="155" text-anchor="middle" font-size="11" fill="#a6e3a1">+</text>
  <text x="345" y="205" font-size="11" font-weight="bold" fill="#a6e3a1">ANODE</text>
  <text x="345" y="220" font-size="10" fill="#a6adc8">Oxidation</text>
  <text x="345" y="233" font-size="10" fill="#a6adc8">Anions → here</text>
  <text x="345" y="246" font-size="10" fill="#a6adc8">Lose electrons</text>

  <!-- Bubbles at anode (O2 or Cl2) -->
  <circle cx="308" cy="350" r="5" fill="#a6e3a1" fill-opacity="0.5"/>
  <circle cx="315" cy="335" r="4" fill="#a6e3a1" fill-opacity="0.5"/>
  <circle cx="305" cy="320" r="3" fill="#a6e3a1" fill-opacity="0.5"/>
  <text x="270" y="360" font-size="9" fill="#a6e3a1" text-anchor="end">O₂ or Cl₂</text>

  <!-- Ion movement arrows -->
  <defs>
    <marker id="arC" markerWidth="7" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0,0 7,3 0,6" fill="#f38ba8"/></marker>
    <marker id="arA" markerWidth="7" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0,0 7,3 0,6" fill="#a6e3a1"/></marker>
  </defs>
  <line x1="240" y1="260" x2="140" y2="260" stroke="#f38ba8" stroke-width="1.5" marker-end="url(#arC)"/>
  <text x="190" y="252" text-anchor="middle" font-size="9" fill="#f38ba8">cations (+)</text>
  <line x1="200" y1="280" x2="300" y2="280" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#arA)"/>
  <text x="250" y="296" text-anchor="middle" font-size="9" fill="#a6e3a1">anions (−)</text>

  <!-- Electron flow arrow in wire -->
  <text x="90" y="100" text-anchor="middle" font-size="9" fill="#f38ba8">e⁻ flow</text>
  <line x1="120" y1="105" x2="165" y2="105" stroke="#f9e2af" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- ══ RIGHT: Products table ══ -->
  <rect x="430" y="50" width="510" height="415" rx="8" fill="#181825"/>
  <text x="685" y="72" text-anchor="middle" font-size="13" font-weight="bold" fill="#cdd6f4">Electrolysis Products Summary</text>

  <!-- Header -->
  <rect x="435" y="80" width="500" height="25" rx="4" fill="#313244"/>
  <text x="545" y="97" text-anchor="middle" font-size="10" font-weight="bold" fill="#cdd6f4">Electrolyte</text>
  <text x="690" y="97" text-anchor="middle" font-size="10" font-weight="bold" fill="#f38ba8">Cathode (−)</text>
  <text x="840" y="97" text-anchor="middle" font-size="10" font-weight="bold" fill="#a6e3a1">Anode (+)</text>

  <!-- Rows -->
  <line x1="440" y1="105" x2="930" y2="105" stroke="#313244" stroke-width="1"/>
  <text x="545" y="122" text-anchor="middle" font-size="10" fill="#a6adc8">Molten NaCl</text>
  <text x="690" y="122" text-anchor="middle" font-size="10" fill="#f38ba8">Na metal</text>
  <text x="840" y="122" text-anchor="middle" font-size="10" fill="#a6e3a1">Cl₂ gas</text>

  <line x1="440" y1="130" x2="930" y2="130" stroke="#313244" stroke-width="1"/>
  <text x="545" y="147" text-anchor="middle" font-size="10" fill="#a6adc8">Dilute NaCl(aq)</text>
  <text x="690" y="147" text-anchor="middle" font-size="10" fill="#f38ba8">H₂ (from H₂O)</text>
  <text x="840" y="147" text-anchor="middle" font-size="10" fill="#a6e3a1">O₂ (from OH⁻)</text>

  <line x1="440" y1="155" x2="930" y2="155" stroke="#313244" stroke-width="1"/>
  <text x="545" y="172" text-anchor="middle" font-size="10" fill="#a6adc8">Conc. NaCl(aq) brine</text>
  <text x="690" y="172" text-anchor="middle" font-size="10" fill="#f38ba8">H₂</text>
  <text x="840" y="172" text-anchor="middle" font-size="10" fill="#a6e3a1">Cl₂ (Cl⁻ discharged)</text>

  <line x1="440" y1="180" x2="930" y2="180" stroke="#313244" stroke-width="1"/>
  <text x="545" y="197" text-anchor="middle" font-size="10" fill="#a6adc8">CuSO₄(aq) inert C electrodes</text>
  <text x="690" y="197" text-anchor="middle" font-size="10" fill="#f38ba8">Cu metal</text>
  <text x="840" y="197" text-anchor="middle" font-size="10" fill="#a6e3a1">O₂</text>

  <line x1="440" y1="205" x2="930" y2="205" stroke="#313244" stroke-width="1"/>
  <text x="545" y="222" text-anchor="middle" font-size="10" fill="#a6adc8">CuSO₄(aq) Cu electrodes</text>
  <text x="690" y="222" text-anchor="middle" font-size="10" fill="#f38ba8">Cu deposits</text>
  <text x="840" y="222" text-anchor="middle" font-size="10" fill="#a6e3a1">Cu dissolves</text>

  <line x1="440" y1="230" x2="930" y2="230" stroke="#313244" stroke-width="1"/>
  <text x="545" y="247" text-anchor="middle" font-size="10" fill="#a6adc8">Molten Al₂O₃ in cryolite</text>
  <text x="690" y="247" text-anchor="middle" font-size="10" fill="#f38ba8">Al metal (liquid)</text>
  <text x="840" y="247" text-anchor="middle" font-size="10" fill="#a6e3a1">O₂ (burns C anodes!)</text>

  <line x1="440" y1="255" x2="930" y2="255" stroke="#313244" stroke-width="1"/>
  <text x="545" y="272" text-anchor="middle" font-size="10" fill="#a6adc8">Dilute H₂SO₄</text>
  <text x="690" y="272" text-anchor="middle" font-size="10" fill="#f38ba8">H₂</text>
  <text x="840" y="272" text-anchor="middle" font-size="10" fill="#a6e3a1">O₂</text>

  <!-- Half equations box -->
  <rect x="435" y="285" width="500" height="165" rx="6" fill="#313244"/>
  <text x="685" y="305" text-anchor="middle" font-size="11" font-weight="bold" fill="#cdd6f4">Key Half-Equations</text>
  <text x="445" y="323" font-size="10" font-weight="bold" fill="#f38ba8">At cathode (REDUCTION — gain e⁻):</text>
  <text x="445" y="338" font-size="10" fill="#a6adc8">Cu²⁺ + 2e⁻ → Cu</text>
  <text x="445" y="352" font-size="10" fill="#a6adc8">2H⁺ + 2e⁻ → H₂</text>
  <text x="445" y="366" font-size="10" fill="#a6adc8">Al³⁺ + 3e⁻ → Al</text>
  <text x="445" y="380" font-size="10" fill="#a6adc8">Na⁺ + e⁻ → Na (only from molten)</text>
  <text x="445" y="400" font-size="10" font-weight="bold" fill="#a6e3a1">At anode (OXIDATION — lose e⁻):</text>
  <text x="445" y="415" font-size="10" fill="#a6adc8">2Cl⁻ → Cl₂ + 2e⁻</text>
  <text x="680" y="415" font-size="10" fill="#a6adc8">4OH⁻ → 2H₂O + O₂ + 4e⁻</text>
  <text x="445" y="430" font-size="10" fill="#a6adc8">Cu → Cu²⁺ + 2e⁻ (soluble anode)</text>
  <text x="445" y="445" font-size="10" fill="#a6adc8">2O²⁻ → O₂ + 4e⁻ (molten oxide)</text>

  <!-- Discharge rules summary -->
  <rect x="430" y="385" width="35" height="80" fill="none"/>
  <text x="94" y="405" text-anchor="middle" font-size="10" fill="#cba6f7" font-weight="bold">Rules:</text>
  <text x="94" y="420" text-anchor="middle" font-size="9" fill="#a6adc8">Cathode: Cu/Ag below H</text>
  <text x="94" y="433" text-anchor="middle" font-size="9" fill="#a6adc8">→ metal deposited</text>
  <text x="94" y="448" text-anchor="middle" font-size="9" fill="#a6adc8">Active metals/dilute → H₂</text>
  <text x="94" y="461" text-anchor="middle" font-size="9" fill="#a6adc8">Anode: Conc halide → halogen</text>
</svg>
