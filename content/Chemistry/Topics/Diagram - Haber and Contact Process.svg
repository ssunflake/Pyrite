<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="Arial, sans-serif">
  <rect width="960" height="480" fill="#1e1e2e" rx="12"/>
  <text x="480" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#cdd6f4">Haber Process and Contact Process — IGCSE Chemistry</text>

  <!-- ══ HABER PROCESS (LEFT) ══ -->
  <text x="240" y="58" text-anchor="middle" font-size="14" font-weight="bold" fill="#a6e3a1">Haber Process — Ammonia (NH₃)</text>

  <!-- Equation box -->
  <rect x="20" y="68" width="445" height="42" rx="6" fill="#313244"/>
  <text x="242" y="87" text-anchor="middle" font-size="13" fill="#a6e3a1">N₂(g) + 3H₂(g) ⇌ 2NH₃(g)</text>
  <text x="242" y="102" text-anchor="middle" font-size="11" fill="#a6adc8">ΔH = −92 kJ/mol (exothermic)</text>

  <!-- Flow diagram -->
  <!-- N2 source -->
  <rect x="20" y="130" width="110" height="45" rx="6" fill="#89b4fa" fill-opacity="0.2" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="75" y="150" text-anchor="middle" font-size="10" fill="#89b4fa">N₂</text>
  <text x="75" y="164" text-anchor="middle" font-size="9" fill="#a6adc8">From air (frac. dist.)</text>

  <!-- H2 source -->
  <rect x="20" y="190" width="110" height="45" rx="6" fill="#f38ba8" fill-opacity="0.2" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="75" y="210" text-anchor="middle" font-size="10" fill="#f38ba8">H₂</text>
  <text x="75" y="224" text-anchor="middle" font-size="9" fill="#a6adc8">Natural gas + steam</text>

  <!-- Arrows to compressor -->
  <defs>
    <marker id="aRight" markerWidth="7" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0,0 7,3 0,6" fill="#a6adc8"/></marker>
    <marker id="aDown" markerWidth="6" markerHeight="7" refX="3" refY="7" orient="auto"><polygon points="0,0 6,0 3,7" fill="#a6adc8"/></marker>
  </defs>
  <line x1="130" y1="153" x2="155" y2="190" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#aRight)"/>
  <line x1="130" y1="213" x2="155" y2="200" stroke="#f38ba8" stroke-width="1.5" marker-end="url(#aRight)"/>

  <!-- Compressor -->
  <rect x="158" y="168" width="80" height="45" rx="6" fill="#f9e2af" fill-opacity="0.2" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="198" y="188" text-anchor="middle" font-size="10" fill="#f9e2af">Compressor</text>
  <text x="198" y="202" text-anchor="middle" font-size="9" fill="#a6adc8">200 atm</text>

  <line x1="238" y1="190" x2="263" y2="190" stroke="#a6adc8" stroke-width="2" marker-end="url(#aRight)"/>

  <!-- Reactor vessel -->
  <rect x="265" y="155" width="100" height="75" rx="8" fill="#a6e3a1" fill-opacity="0.15" stroke="#a6e3a1" stroke-width="2"/>
  <text x="315" y="178" text-anchor="middle" font-size="10" fill="#a6e3a1">Reactor</text>
  <text x="315" y="192" text-anchor="middle" font-size="10" fill="#a6e3a1">vessel</text>
  <text x="315" y="207" text-anchor="middle" font-size="9" fill="#f9e2af">450°C</text>
  <text x="315" y="220" text-anchor="middle" font-size="9" fill="#fab387">Fe catalyst</text>

  <line x1="365" y1="190" x2="390" y2="190" stroke="#a6adc8" stroke-width="2" marker-end="url(#aRight)"/>

  <!-- Condenser / cooler -->
  <rect x="393" y="168" width="80" height="45" rx="6" fill="#89b4fa" fill-opacity="0.2" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="433" y="188" text-anchor="middle" font-size="10" fill="#89b4fa">Condenser</text>
  <text x="433" y="202" text-anchor="middle" font-size="9" fill="#a6adc8">Cool → NH₃ liquefies</text>

  <line x1="433" y1="213" x2="433" y2="240" stroke="#a6adc8" stroke-width="2"/>
  <polygon points="428,238 438,238 433,250" fill="#a6adc8"/>

  <!-- Storage NH3 -->
  <rect x="383" y="255" width="100" height="40" rx="6" fill="#a6e3a1" fill-opacity="0.3" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="433" y="273" text-anchor="middle" font-size="11" fill="#a6e3a1">NH₃ collected</text>
  <text x="433" y="287" text-anchor="middle" font-size="9" fill="#a6adc8">(liquid)</text>

  <!-- Unreacted gases recycled -->
  <path d="M433,255 L433,140 L265,140 L265,168" fill="none" stroke="#cba6f7" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="340" y="135" text-anchor="middle" font-size="9" fill="#cba6f7">N₂ + H₂ unreacted → recycled</text>

  <!-- Conditions box -->
  <rect x="20" y="310" width="445" height="120" rx="8" fill="#181825"/>
  <text x="242" y="330" text-anchor="middle" font-size="12" font-weight="bold" fill="#cdd6f4">Conditions and Reasoning</text>

  <text x="30" y="350" font-size="10" fill="#f9e2af">Temperature: 450°C (compromise)</text>
  <text x="30" y="365" font-size="9" fill="#a6adc8">  Lower T → more NH₃ (Le Chatelier: exo → lower T favours products)</text>
  <text x="30" y="378" font-size="9" fill="#a6adc8">  But lower T → too slow. 450°C = acceptable rate + acceptable yield (~15%)</text>
  <text x="30" y="395" font-size="10" fill="#f9e2af">Pressure: 200 atm</text>
  <text x="30" y="409" font-size="9" fill="#a6adc8">  Higher P → more NH₃ (4 mol gas → 2 mol). Limited by cost/safety.</text>
  <text x="30" y="422" font-size="10" fill="#f9e2af">Catalyst: Iron (Fe)</text>
  <text x="30" y="436" font-size="9" fill="#a6adc8">  Increases rate but doesn't shift equilibrium. Unreacted gases recycled.</text>

  <!-- ══ CONTACT PROCESS (RIGHT) ══ -->
  <text x="715" y="58" text-anchor="middle" font-size="14" font-weight="bold" fill="#fab387">Contact Process — H₂SO₄</text>

  <!-- Stage boxes -->
  <!-- Stage 1 -->
  <rect x="490" y="75" width="440" height="55" rx="8" fill="#313244"/>
  <text x="710" y="96" text-anchor="middle" font-size="11" font-weight="bold" fill="#f9e2af">Stage 1 — Burn sulfur in air</text>
  <text x="710" y="115" text-anchor="middle" font-size="12" fill="#cdd6f4">S(s) + O₂(g) → SO₂(g)</text>

  <line x1="710" y1="130" x2="710" y2="152" stroke="#a6adc8" stroke-width="2"/>
  <polygon points="705,150 715,150 710,162" fill="#a6adc8"/>

  <!-- Stage 2 (key step) -->
  <rect x="490" y="163" width="440" height="75" rx="8" fill="#fab387" fill-opacity="0.12" stroke="#fab387" stroke-width="2"/>
  <text x="710" y="183" text-anchor="middle" font-size="11" font-weight="bold" fill="#fab387">Stage 2 — Catalytic oxidation (key reversible step)</text>
  <text x="710" y="200" text-anchor="middle" font-size="12" fill="#cdd6f4">2SO₂(g) + O₂(g) ⇌ 2SO₃(g)</text>
  <text x="710" y="215" text-anchor="middle" font-size="10" fill="#a6adc8">ΔH = −197 kJ/mol | Catalyst: V₂O₅ | 450°C | ~1–2 atm | Yield: ~98%</text>
  <text x="710" y="230" text-anchor="middle" font-size="9" fill="#a6adc8">(Low pressure not needed — high yield already; high pressure costly)</text>

  <line x1="710" y1="238" x2="710" y2="258" stroke="#a6adc8" stroke-width="2"/>
  <polygon points="705,256 715,256 710,268" fill="#a6adc8"/>

  <!-- Stage 3 -->
  <rect x="490" y="268" width="440" height="65" rx="8" fill="#313244"/>
  <text x="710" y="288" text-anchor="middle" font-size="11" font-weight="bold" fill="#cba6f7">Stage 3 — Absorb SO₃ in conc. H₂SO₄ (NOT water!)</text>
  <text x="710" y="307" text-anchor="middle" font-size="11" fill="#cdd6f4">SO₃ + H₂SO₄ → H₂S₂O₇ (oleum)</text>
  <text x="710" y="322" text-anchor="middle" font-size="10" fill="#a6adc8">Oleum then carefully diluted: H₂S₂O₇ + H₂O → 2H₂SO₄</text>

  <line x1="710" y1="333" x2="710" y2="353" stroke="#a6adc8" stroke-width="2"/>
  <polygon points="705,351 715,351 710,363" fill="#a6adc8"/>

  <!-- Output -->
  <rect x="575" y="363" width="270" height="40" rx="8" fill="#fab387" fill-opacity="0.3" stroke="#fab387" stroke-width="2"/>
  <text x="710" y="387" text-anchor="middle" font-size="12" font-weight="bold" fill="#fab387">Concentrated H₂SO₄ (98%)</text>

  <!-- Why not directly dissolve in water -->
  <rect x="490" y="415" width="440" height="55" rx="8" fill="#181825"/>
  <text x="710" y="433" text-anchor="middle" font-size="11" font-weight="bold" fill="#f38ba8">⚠️ Why SO₃ is NOT dissolved directly in water:</text>
  <text x="710" y="449" text-anchor="middle" font-size="10" fill="#a6adc8">SO₃ + H₂O → extremely vigorous exothermic reaction → fine acid mist</text>
  <text x="710" y="463" text-anchor="middle" font-size="10" fill="#a6adc8">Very difficult to handle; absorbed in H₂SO₄ instead → safe oleum route</text>
</svg>
