<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 500" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="920" height="500" fill="#1e1e2e" rx="12"/>
  <text x="460" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#cdd6f4">Electric Circuits — IGCSE Physics</text>

  <!-- ═══════════════════ CIRCUIT SYMBOLS ═══════════════════ -->
  <text x="250" y="58" text-anchor="middle" font-size="14" font-weight="bold" fill="#89b4fa">Circuit Symbols</text>

  <!-- Cell -->
  <line x1="30" y1="85" x2="60" y2="85" stroke="#a6adc8" stroke-width="2"/>
  <line x1="60" y1="75" x2="60" y2="95" stroke="#a6adc8" stroke-width="3"/>
  <line x1="70" y1="79" x2="70" y2="91" stroke="#a6adc8" stroke-width="1.5"/>
  <line x1="70" y1="85" x2="100" y2="85" stroke="#a6adc8" stroke-width="2"/>
  <text x="65" y="108" text-anchor="middle" font-size="11" fill="#a6adc8">Cell</text>
  <text x="62" y="72" text-anchor="middle" font-size="9" fill="#f9e2af">+</text>
  <text x="73" y="78" text-anchor="middle" font-size="9" fill="#f9e2af">−</text>

  <!-- Resistor -->
  <line x1="120" y1="85" x2="145" y2="85" stroke="#a6adc8" stroke-width="2"/>
  <rect x="145" y="76" width="40" height="18" stroke="#a6adc8" stroke-width="2" fill="none"/>
  <line x1="185" y1="85" x2="210" y2="85" stroke="#a6adc8" stroke-width="2"/>
  <text x="165" y="108" text-anchor="middle" font-size="11" fill="#a6adc8">Resistor</text>

  <!-- Variable Resistor -->
  <line x1="230" y1="85" x2="255" y2="85" stroke="#a6adc8" stroke-width="2"/>
  <rect x="255" y="76" width="40" height="18" stroke="#a6adc8" stroke-width="2" fill="none"/>
  <line x1="295" y1="85" x2="320" y2="85" stroke="#a6adc8" stroke-width="2"/>
  <line x1="263" y1="100" x2="285" y2="70" stroke="#f9e2af" stroke-width="1.5" marker-end="url(#arrSmall)"/>
  <text x="275" y="115" text-anchor="middle" font-size="11" fill="#a6adc8">Variable R</text>

  <!-- Lamp -->
  <line x1="340" y1="85" x2="360" y2="85" stroke="#a6adc8" stroke-width="2"/>
  <circle cx="375" cy="85" r="15" stroke="#f9e2af" stroke-width="2" fill="none"/>
  <line x1="364" y1="96" x2="386" y2="74" stroke="#f9e2af" stroke-width="2"/>
  <line x1="364" y1="74" x2="386" y2="96" stroke="#f9e2af" stroke-width="2"/>
  <line x1="390" y1="85" x2="410" y2="85" stroke="#a6adc8" stroke-width="2"/>
  <text x="375" y="115" text-anchor="middle" font-size="11" fill="#a6adc8">Lamp</text>

  <!-- Switch -->
  <line x1="430" y1="85" x2="455" y2="85" stroke="#a6adc8" stroke-width="2"/>
  <circle cx="455" cy="85" r="3" fill="#a6adc8"/>
  <line x1="455" y1="85" x2="490" y2="72" stroke="#a6adc8" stroke-width="2"/>
  <circle cx="490" cy="85" r="3" fill="#a6adc8"/>
  <line x1="490" y1="85" x2="515" y2="85" stroke="#a6adc8" stroke-width="2"/>
  <text x="473" y="108" text-anchor="middle" font-size="11" fill="#a6adc8">Switch</text>

  <!-- Ammeter -->
  <line x1="530" y1="85" x2="550" y2="85" stroke="#a6adc8" stroke-width="2"/>
  <circle cx="565" cy="85" r="15" stroke="#89b4fa" stroke-width="2" fill="none"/>
  <text x="565" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#89b4fa">A</text>
  <line x1="580" y1="85" x2="600" y2="85" stroke="#a6adc8" stroke-width="2"/>
  <text x="565" y="115" text-anchor="middle" font-size="11" fill="#a6adc8">Ammeter</text>
  <text x="565" y="126" text-anchor="middle" font-size="10" fill="#89b4fa">(series)</text>

  <!-- Voltmeter -->
  <line x1="620" y1="85" x2="640" y2="85" stroke="#a6adc8" stroke-width="2"/>
  <circle cx="655" cy="85" r="15" stroke="#a6e3a1" stroke-width="2" fill="none"/>
  <text x="655" y="90" text-anchor="middle" font-size="13" font-weight="bold" fill="#a6e3a1">V</text>
  <line x1="670" y1="85" x2="690" y2="85" stroke="#a6adc8" stroke-width="2"/>
  <text x="655" y="115" text-anchor="middle" font-size="11" fill="#a6adc8">Voltmeter</text>
  <text x="655" y="126" text-anchor="middle" font-size="10" fill="#a6e3a1">(parallel)</text>

  <!-- LDR -->
  <line x1="710" y1="85" x2="730" y2="85" stroke="#a6adc8" stroke-width="2"/>
  <rect x="730" y="76" width="40" height="18" stroke="#f9e2af" stroke-width="2" fill="none"/>
  <line x1="770" y1="85" x2="790" y2="85" stroke="#a6adc8" stroke-width="2"/>
  <line x1="738" y1="63" x2="744" y2="75" stroke="#f9e2af" stroke-width="1.5" marker-end="url(#arrSmall)"/>
  <line x1="750" y1="58" x2="756" y2="70" stroke="#f9e2af" stroke-width="1.5" marker-end="url(#arrSmall)"/>
  <text x="755" y="108" text-anchor="middle" font-size="11" fill="#a6adc8">LDR</text>

  <!-- Diode -->
  <line x1="810" y1="85" x2="830" y2="85" stroke="#a6adc8" stroke-width="2"/>
  <polygon points="830,74 830,96 858,85" stroke="#cba6f7" stroke-width="2" fill="none"/>
  <line x1="858" y1="74" x2="858" y2="96" stroke="#cba6f7" stroke-width="2.5"/>
  <line x1="858" y1="85" x2="880" y2="85" stroke="#a6adc8" stroke-width="2"/>
  <text x="850" y="108" text-anchor="middle" font-size="11" fill="#a6adc8">Diode</text>

  <!-- ═══════════════════ SERIES CIRCUIT ═══════════════════ -->
  <text x="250" y="155" text-anchor="middle" font-size="13" font-weight="bold" fill="#89b4fa">Series Circuit</text>

  <!-- Battery -->
  <line x1="30" y1="195" x2="30" y2="265" stroke="#a6adc8" stroke-width="2"/>
  <line x1="30" y1="195" x2="220" y2="195" stroke="#a6adc8" stroke-width="2"/>
  <line x1="30" y1="205" x2="45" y2="205" stroke="#a6adc8" stroke-width="3"/>
  <line x1="30" y1="215" x2="40" y2="215" stroke="#a6adc8" stroke-width="1.5"/>
  <line x1="30" y1="225" x2="45" y2="225" stroke="#a6adc8" stroke-width="3"/>
  <line x1="30" y1="235" x2="40" y2="235" stroke="#a6adc8" stroke-width="1.5"/>
  <rect x="220" y="185" width="40" height="18" stroke="#f38ba8" stroke-width="2" fill="none"/>
  <line x1="260" y1="195" x2="340" y2="195" stroke="#a6adc8" stroke-width="2"/>
  <rect x="340" y="185" width="40" height="18" stroke="#f38ba8" stroke-width="2" fill="none"/>
  <line x1="380" y1="195" x2="450" y2="195" stroke="#a6adc8" stroke-width="2"/>
  <line x1="450" y1="195" x2="450" y2="265" stroke="#a6adc8" stroke-width="2"/>
  <line x1="30" y1="265" x2="450" y2="265" stroke="#a6adc8" stroke-width="2"/>

  <text x="240" y="215" text-anchor="middle" font-size="10" fill="#f38ba8">R₁</text>
  <text x="360" y="215" text-anchor="middle" font-size="10" fill="#f38ba8">R₂</text>
  <text x="30" y="285" text-anchor="middle" font-size="10" fill="#f9e2af">V</text>

  <!-- Rules box -->
  <rect x="30" y="290" width="420" height="75" rx="6" fill="#181825"/>
  <text x="240" y="308" text-anchor="middle" font-size="12" font-weight="bold" fill="#cdd6f4">Series Rules:</text>
  <text x="240" y="326" text-anchor="middle" font-size="12" fill="#f9e2af">I same throughout  •  V₁ + V₂ = V_total</text>
  <text x="240" y="344" text-anchor="middle" font-size="12" fill="#f9e2af">R_total = R₁ + R₂</text>
  <text x="240" y="360" text-anchor="middle" font-size="11" fill="#fab387">⚠ If one component breaks → all stop</text>

  <!-- ═══════════════════ PARALLEL CIRCUIT ═══════════════════ -->
  <text x="700" y="155" text-anchor="middle" font-size="13" font-weight="bold" fill="#a6e3a1">Parallel Circuit</text>

  <!-- Battery -->
  <line x1="480" y1="195" x2="480" y2="265" stroke="#a6adc8" stroke-width="2"/>
  <line x1="480" y1="205" x2="495" y2="205" stroke="#a6adc8" stroke-width="3"/>
  <line x1="480" y1="215" x2="490" y2="215" stroke="#a6adc8" stroke-width="1.5"/>
  <line x1="480" y1="225" x2="495" y2="225" stroke="#a6adc8" stroke-width="3"/>
  <line x1="480" y1="235" x2="490" y2="235" stroke="#a6adc8" stroke-width="1.5"/>

  <!-- Top rail -->
  <line x1="480" y1="195" x2="900" y2="195" stroke="#a6adc8" stroke-width="2"/>
  <!-- Bottom rail -->
  <line x1="480" y1="265" x2="900" y2="265" stroke="#a6adc8" stroke-width="2"/>

  <!-- Branch 1: R1 -->
  <line x1="620" y1="195" x2="620" y2="210" stroke="#a6adc8" stroke-width="2"/>
  <rect x="605" y="210" width="30" height="40" stroke="#a6e3a1" stroke-width="2" fill="none"/>
  <line x1="620" y1="250" x2="620" y2="265" stroke="#a6adc8" stroke-width="2"/>
  <text x="647" y="235" text-anchor="start" font-size="11" fill="#a6e3a1">R₁</text>

  <!-- Branch 2: R2 -->
  <line x1="760" y1="195" x2="760" y2="210" stroke="#a6adc8" stroke-width="2"/>
  <rect x="745" y="210" width="30" height="40" stroke="#a6e3a1" stroke-width="2" fill="none"/>
  <line x1="760" y1="250" x2="760" y2="265" stroke="#a6adc8" stroke-width="2"/>
  <text x="787" y="235" text-anchor="start" font-size="11" fill="#a6e3a1">R₂</text>

  <!-- Close right side -->
  <line x1="900" y1="195" x2="900" y2="265" stroke="#a6adc8" stroke-width="2"/>

  <!-- Current arrows -->
  <text x="540" y="188" text-anchor="middle" font-size="11" fill="#89b4fa">I_total</text>
  <text x="620" y="183" text-anchor="middle" font-size="10" fill="#a6e3a1">I₁</text>
  <text x="760" y="183" text-anchor="middle" font-size="10" fill="#a6e3a1">I₂</text>

  <!-- Rules box -->
  <rect x="480" y="285" width="420" height="90" rx="6" fill="#181825"/>
  <text x="690" y="303" text-anchor="middle" font-size="12" font-weight="bold" fill="#cdd6f4">Parallel Rules:</text>
  <text x="690" y="321" text-anchor="middle" font-size="12" fill="#f9e2af">V same across each branch</text>
  <text x="690" y="339" text-anchor="middle" font-size="12" fill="#f9e2af">I_total = I₁ + I₂    •    1/R_T = 1/R₁ + 1/R₂</text>
  <text x="690" y="357" text-anchor="middle" font-size="11" fill="#a6e3a1">✓ If one branch breaks → others still work</text>
  <text x="690" y="370" text-anchor="middle" font-size="11" fill="#a6adc8">(used in homes)</text>

  <!-- ═══════════════════ OHMS LAW ═══════════════════ -->
  <rect x="20" y="385" width="880" height="100" rx="8" fill="#181825"/>
  <text x="460" y="405" text-anchor="middle" font-size="13" font-weight="bold" fill="#cdd6f4">Key Formulas</text>

  <text x="155" y="430" text-anchor="middle" font-size="14" fill="#f9e2af">V = IR</text>
  <text x="155" y="448" text-anchor="middle" font-size="11" fill="#a6adc8">Ohm's Law</text>
  <text x="155" y="462" text-anchor="middle" font-size="10" fill="#a6adc8">(constant temperature)</text>

  <line x1="280" y1="390" x2="280" y2="475" stroke="#313244" stroke-width="1"/>

  <text x="400" y="430" text-anchor="middle" font-size="14" fill="#f9e2af">P = IV = I²R = V²/R</text>
  <text x="400" y="448" text-anchor="middle" font-size="11" fill="#a6adc8">Power (Watts)</text>

  <line x1="540" y1="390" x2="540" y2="475" stroke="#313244" stroke-width="1"/>

  <text x="650" y="430" text-anchor="middle" font-size="14" fill="#f9e2af">I = Q/t</text>
  <text x="650" y="448" text-anchor="middle" font-size="11" fill="#a6adc8">Current = charge/time</text>

  <line x1="760" y1="390" x2="760" y2="475" stroke="#313244" stroke-width="1"/>

  <text x="840" y="430" text-anchor="middle" font-size="14" fill="#f9e2af">E = Pt</text>
  <text x="840" y="448" text-anchor="middle" font-size="11" fill="#a6adc8">Energy = power × time</text>

  <defs>
    <marker id="arrSmall" markerWidth="5" markerHeight="5" refX="2" refY="2.5" orient="auto">
      <polygon points="0,0 5,2.5 0,5" fill="#f9e2af"/>
    </marker>
  </defs>

</svg>
