<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="420" fill="#1e1e2e" rx="12"/>
  <text x="450" y="32" text-anchor="middle" font-size="18" font-weight="bold" fill="#cdd6f4">Motion Graphs — IGCSE Physics</text>

  <!-- ═══════════════════════════════════ -->
  <!-- LEFT: Distance-Time Graph -->
  <!-- ═══════════════════════════════════ -->
  <text x="220" y="60" text-anchor="middle" font-size="14" font-weight="bold" fill="#89b4fa">Distance–Time Graph</text>

  <!-- Axes -->
  <line x1="60" y1="360" x2="60" y2="80" stroke="#6c7086" stroke-width="2"/>
  <line x1="60" y1="360" x2="400" y2="360" stroke="#6c7086" stroke-width="2"/>

  <!-- Axis labels -->
  <text x="230" y="395" text-anchor="middle" font-size="13" fill="#a6adc8">Time (s)</text>
  <text x="30" y="225" text-anchor="middle" font-size="13" fill="#a6adc8" transform="rotate(-90,30,225)">Distance (m)</text>

  <!-- Arrow heads -->
  <polygon points="60,78 55,90 65,90" fill="#6c7086"/>
  <polygon points="402,360 390,355 390,365" fill="#6c7086"/>

  <!-- Line 1: Stationary (horizontal) -->
  <line x1="70" y1="200" x2="130" y2="200" stroke="#a6e3a1" stroke-width="2.5"/>
  <text x="95" y="190" text-anchor="middle" font-size="11" fill="#a6e3a1">stationary</text>

  <!-- Line 2: Constant speed (diagonal) -->
  <line x1="130" y1="200" x2="220" y2="120" stroke="#89b4fa" stroke-width="2.5"/>
  <text x="185" y="145" text-anchor="middle" font-size="11" fill="#89b4fa">constant speed</text>
  <text x="185" y="158" text-anchor="middle" font-size="10" fill="#89b4fa">(straight line)</text>

  <!-- Line 3: Accelerating (curve) -->
  <path d="M220,120 Q260,110 310,80" stroke="#f38ba8" stroke-width="2.5" fill="none"/>
  <text x="290" y="98" text-anchor="middle" font-size="11" fill="#f38ba8">accelerating</text>
  <text x="290" y="110" text-anchor="middle" font-size="10" fill="#f38ba8">(curve steepens)</text>

  <!-- Gradient annotation -->
  <line x1="130" y1="200" x2="180" y2="200" stroke="#89b4fa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="180" y1="200" x2="180" y2="155" stroke="#89b4fa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="155" y="215" text-anchor="middle" font-size="10" fill="#89b4fa">Δt</text>
  <text x="192" y="180" text-anchor="middle" font-size="10" fill="#89b4fa">Δd</text>
  <rect x="60" y="330" width="330" height="22" rx="5" fill="#313244"/>
  <text x="225" y="345" text-anchor="middle" font-size="11" fill="#f9e2af">gradient = speed</text>

  <!-- ═══════════════════════════════════ -->
  <!-- RIGHT: Velocity-Time Graph -->
  <!-- ═══════════════════════════════════ -->
  <text x="670" y="60" text-anchor="middle" font-size="14" font-weight="bold" fill="#89b4fa">Velocity–Time Graph</text>

  <!-- Axes -->
  <line x1="500" y1="360" x2="500" y2="80" stroke="#6c7086" stroke-width="2"/>
  <line x1="500" y1="360" x2="870" y2="360" stroke="#6c7086" stroke-width="2"/>

  <!-- Axis labels -->
  <text x="685" y="395" text-anchor="middle" font-size="13" fill="#a6adc8">Time (s)</text>
  <text x="472" y="225" text-anchor="middle" font-size="13" fill="#a6adc8" transform="rotate(-90,472,225)">Velocity (m/s)</text>

  <!-- Arrow heads -->
  <polygon points="500,78 495,90 505,90" fill="#6c7086"/>
  <polygon points="872,360 860,355 860,365" fill="#6c7086"/>

  <!-- Line 1: Constant velocity (horizontal) -->
  <line x1="510" y1="220" x2="590" y2="220" stroke="#a6e3a1" stroke-width="2.5"/>
  <text x="545" y="210" text-anchor="middle" font-size="11" fill="#a6e3a1">constant velocity</text>
  <text x="545" y="222" text-anchor="middle" font-size="10" fill="#a6e3a1">(a = 0)</text>

  <!-- Line 2: Constant acceleration (diagonal up) -->
  <line x1="590" y1="220" x2="700" y2="110" stroke="#89b4fa" stroke-width="2.5"/>
  <text x="660" y="130" text-anchor="middle" font-size="11" fill="#89b4fa">constant</text>
  <text x="660" y="143" text-anchor="middle" font-size="11" fill="#89b4fa">acceleration</text>

  <!-- Line 3: Deceleration (diagonal down to terminal) -->
  <line x1="700" y1="110" x2="790" y2="190" stroke="#fab387" stroke-width="2.5"/>
  <text x="762" y="145" text-anchor="middle" font-size="11" fill="#fab387">deceleration</text>

  <!-- Line 4: Terminal velocity -->
  <line x1="790" y1="190" x2="860" y2="190" stroke="#cba6f7" stroke-width="2.5"/>
  <text x="830" y="180" text-anchor="middle" font-size="11" fill="#cba6f7">terminal</text>
  <text x="830" y="193" text-anchor="middle" font-size="10" fill="#cba6f7">velocity</text>

  <!-- Area shading -->
  <polygon points="590,220 700,110 700,220" fill="#89b4fa" fill-opacity="0.15"/>
  <text x="648" y="200" text-anchor="middle" font-size="10" fill="#89b4fa">area =</text>
  <text x="648" y="213" text-anchor="middle" font-size="10" fill="#89b4fa">displacement</text>

  <!-- Gradient annotation -->
  <line x1="590" y1="220" x2="640" y2="220" stroke="#89b4fa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="640" y1="220" x2="640" y2="165" stroke="#89b4fa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="615" y="235" text-anchor="middle" font-size="10" fill="#89b4fa">Δt</text>
  <text x="652" y="195" text-anchor="middle" font-size="10" fill="#89b4fa">Δv</text>

  <rect x="500" y="330" width="360" height="22" rx="5" fill="#313244"/>
  <text x="680" y="345" text-anchor="middle" font-size="11" fill="#f9e2af">gradient = acceleration  |  area = displacement</text>

</svg>
