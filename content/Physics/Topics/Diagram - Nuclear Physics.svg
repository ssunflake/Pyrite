<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="920" height="480" fill="#1e1e2e" rx="12"/>
  <text x="460" y="30" text-anchor="middle" font-size="17" font-weight="bold" fill="#cdd6f4">Nuclear Physics — IGCSE Physics</text>

  <!-- ═══════════ ATOM STRUCTURE ═══════════ -->
  <text x="200" y="58" text-anchor="middle" font-size="14" font-weight="bold" fill="#89b4fa">Structure of the Atom</text>

  <!-- Nucleus -->
  <circle cx="200" cy="175" r="35" fill="#313244" stroke="#f38ba8" stroke-width="2"/>
  <text x="200" y="168" text-anchor="middle" font-size="11" font-weight="bold" fill="#cdd6f4">NUCLEUS</text>
  <text x="200" y="182" text-anchor="middle" font-size="10" fill="#f38ba8">protons (+)</text>
  <text x="200" y="194" text-anchor="middle" font-size="10" fill="#a6adc8">neutrons (0)</text>

  <!-- Electron shells -->
  <circle cx="200" cy="175" r="70" fill="none" stroke="#45475a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="200" cy="175" r="105" fill="none" stroke="#45475a" stroke-width="1.5" stroke-dasharray="4,3"/>
  <circle cx="200" cy="175" r="140" fill="none" stroke="#45475a" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Electrons on shells -->
  <circle cx="200" cy="105" r="7" fill="#89b4fa"/>
  <circle cx="270" cy="175" r="7" fill="#89b4fa"/>
  <text x="200" y="100" text-anchor="middle" font-size="10" fill="#89b4fa">e⁻</text>
  <text x="280" y="175" text-anchor="middle" font-size="10" fill="#89b4fa">e⁻</text>

  <circle cx="200" cy="70" r="7" fill="#89b4fa"/>
  <circle cx="305" cy="175" r="7" fill="#89b4fa"/>
  <circle cx="200" cy="280" r="7" fill="#89b4fa"/>
  <circle cx="95" cy="175" r="7" fill="#89b4fa"/>
  <circle cx="253" cy="105" r="7" fill="#89b4fa"/>
  <circle cx="253" cy="245" r="7" fill="#89b4fa"/>
  <circle cx="147" cy="105" r="7" fill="#89b4fa"/>
  <circle cx="147" cy="245" r="7" fill="#89b4fa"/>

  <!-- Shell labels -->
  <text x="285" y="112" text-anchor="start" font-size="11" fill="#45475a">shell 1 (max 2e)</text>
  <text x="315" y="175" text-anchor="start" font-size="11" fill="#45475a">shell 2 (max 8e)</text>
  <text x="330" y="225" text-anchor="start" font-size="11" fill="#45475a">shell 3 (max 8e)</text>

  <!-- Nuclide notation box -->
  <rect x="20" y="330" width="370" height="130" rx="8" fill="#181825"/>
  <text x="205" y="352" text-anchor="middle" font-size="13" font-weight="bold" fill="#cdd6f4">Nuclide Notation</text>
  <text x="140" y="395" text-anchor="middle" font-size="50" fill="#f9e2af">A</text>
  <text x="100" y="380" text-anchor="middle" font-size="30" fill="#f38ba8">Z</text>
  <text x="185" y="395" text-anchor="middle" font-size="50" fill="#89b4fa">X</text>
  <text x="100" y="415" text-anchor="middle" font-size="11" fill="#f38ba8">atomic no.</text>
  <text x="100" y="428" text-anchor="middle" font-size="10" fill="#f38ba8">(proton no.)</text>
  <text x="195" y="415" text-anchor="middle" font-size="11" fill="#f9e2af">mass no.</text>
  <text x="195" y="428" text-anchor="middle" font-size="10" fill="#f9e2af">(nucleon no.)</text>
  <text x="310" y="390" text-anchor="middle" font-size="11" fill="#a6adc8">neutrons =</text>
  <text x="310" y="407" text-anchor="middle" font-size="13" fill="#f9e2af">A − Z</text>
  <text x="310" y="425" text-anchor="middle" font-size="10" fill="#a6adc8">e.g. ²³⁸₉₂U has</text>
  <text x="310" y="440" text-anchor="middle" font-size="10" fill="#a6adc8">92p, 146n, 92e</text>

  <!-- ═══════════ RADIATION TYPES ═══════════ -->
  <text x="725" y="30" text-anchor="middle" font-size="14" font-weight="bold" fill="#89b4fa">Types of Radiation</text>

  <!-- Source -->
  <rect x="440" y="75" width="50" height="100" rx="4" fill="#45475a"/>
  <text x="465" y="125" text-anchor="middle" font-size="11" fill="#cdd6f4">Source</text>

  <!-- Alpha beam -->
  <line x1="490" y1="88" x2="590" y2="88" stroke="#f38ba8" stroke-width="3"/>
  <polygon points="590,83 610,88 590,93" fill="#f38ba8"/>
  <!-- Alpha label -->
  <text x="640" y="76" text-anchor="start" font-size="13" font-weight="bold" fill="#f38ba8">α Alpha</text>
  <text x="575" y="105" text-anchor="start" font-size="10" fill="#FFFFFF">⁴₂He nucleus  •  +2 charge</text>

  <!-- Barriers -->
  <!-- Paper -->
  <rect x="625" y="70" width="12" height="110" rx="2" fill="#a6adc8" fill-opacity="0.4"/>
  <text x="631" y="192" text-anchor="middle" font-size="10" fill="#a6adc8">paper</text>
  <!-- Alpha stopped by paper -->
  <line x1="610" y1="88" x2="625" y2="88" stroke="#f38ba8" stroke-width="2"/>
  <text x="617" y="80" text-anchor="middle" font-size="12" fill="#f38ba8">✕</text>

  <!-- Aluminium -->
  <rect x="720" y="70" width="15" height="110" rx="2" fill="#89b4fa" fill-opacity="0.4"/>
  <text x="727" y="192" text-anchor="middle" font-size="10" fill="#89b4fa">Al</text>

  <!-- Lead -->
  <rect x="810" y="70" width="20" height="110" rx="2" fill="#f38ba8" fill-opacity="0.4"/>
  <text x="820" y="192" text-anchor="middle" font-size="10" fill="#f38ba8">Pb</text>

  <!-- Beta beam -->
  <line x1="490" y1="120" x2="714" y2="120" stroke="#89b4fa" stroke-width="2.5"/>
  <polygon points="714,115 734,120 714,125" fill="#89b4fa"/>
  <text x="740" y="108" text-anchor="start" font-size="13" font-weight="bold" fill="#89b4fa">β Beta</text>
  <text x="650" y="135" text-anchor="start" font-size="10" fill="#FFFFFF">fast electron  •  −1 charge</text>
  <!-- Beta stopped by Al -->
  <text x="722" y="112" text-anchor="middle" font-size="12" fill="#89b4fa">✕</text>

  <!-- Gamma beam -->
  <line x1="490" y1="152" x2="900" y2="152" stroke="#a6e3a1" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="885" y="140" text-anchor="end" font-size="13" font-weight="bold" fill="#a6e3a1">γ Gamma</text>
  <text x="885" y="165" text-anchor="end" font-size="10" fill="#FFFFFF">EM wave  •  0 charge  •  needs thick Pb</text>

  <!-- Barrier text at top -->
  <text x="631" y="55" text-anchor="middle" font-size="10" fill="#a6adc8">paper/</text>
  <text x="631" y="65" text-anchor="middle" font-size="10" fill="#a6adc8">skin</text>
  <text x="727" y="55" text-anchor="middle" font-size="10" fill="#89b4fa">3mm</text>
  <text x="727" y="65" text-anchor="middle" font-size="10" fill="#89b4fa">Al</text>
  <text x="820" y="55" text-anchor="middle" font-size="10" fill="#f38ba8">thick</text>
  <text x="820" y="65" text-anchor="middle" font-size="10" fill="#f38ba8">Pb</text>

  <!-- ═══════════ DECAY EQUATIONS ═══════════ -->
  <rect x="440" y="210" width="465" height="145" rx="8" fill="#181825"/>
  <text x="672" y="230" text-anchor="middle" font-size="13" font-weight="bold" fill="#cdd6f4">Nuclear Decay Equations</text>

  <!-- Alpha decay -->
  <text x="460" y="255" text-anchor="start" font-size="12" font-weight="bold" fill="#f38ba8">α decay:</text>
  <text x="540" y="255" text-anchor="start" font-size="12" fill="#cdd6f4">  ᴬ_Z X  →  ᴬ⁻⁴_(Z-2) Y  +  ⁴₂α</text>
  <text x="540" y="270" text-anchor="start" font-size="10" fill="#a6adc8">  mass number −4, atomic number −2</text>

  <!-- Beta decay -->
  <text x="460" y="294" text-anchor="start" font-size="12" font-weight="bold" fill="#89b4fa">β decay:</text>
  <text x="540" y="294" text-anchor="start" font-size="12" fill="#cdd6f4">  ᴬ_Z X  →  ᴬ_(Z+1) Y  +  ⁰₋₁β</text>
  <text x="540" y="309" text-anchor="start" font-size="10" fill="#a6adc8">  mass number unchanged, atomic number +1</text>
  <text x="540" y="322" text-anchor="start" font-size="10" fill="#a6adc8">  (neutron → proton + electron)</text>

  <!-- Gamma -->
  <text x="460" y="346" text-anchor="start" font-size="12" font-weight="bold" fill="#a6e3a1">γ emission:</text>
  <text x="555" y="346" text-anchor="start" font-size="11" fill="#a6adc8">No change to A or Z — nucleus loses energy only</text>

  <!-- Half-life box -->
  <rect x="440" y="365" width="465" height="100" rx="8" fill="#181825"/>
  <text x="672" y="385" text-anchor="middle" font-size="13" font-weight="bold" fill="#cdd6f4">Half-Life</text>
  <text x="672" y="405" text-anchor="middle" font-size="11" fill="#a6adc8">Time for activity (or number of nuclei) to halve</text>

  <!-- Half-life bar -->
  <rect x="460" y="415" width="200" height="16" rx="4" fill="#f38ba8" fill-opacity="0.8"/>
  <text x="560" y="427" text-anchor="middle" font-size="10" fill="#1e1e2e" font-weight="bold">N₀ (start)</text>

  <rect x="460" y="436" width="100" height="14" rx="4" fill="#f38ba8" fill-opacity="0.5"/>
  <text x="510" y="447" text-anchor="middle" font-size="10" fill="#1e1e2e">N₀/2</text>

  <rect x="460" y="455" width="50" height="12" rx="4" fill="#f38ba8" fill-opacity="0.4"/>
  <text x="485" y="465" text-anchor="middle" font-size="9" fill="#1e1e2e">N₀/4</text>

  <text x="680" y="425" text-anchor="start" font-size="12" fill="#f9e2af">N = N₀ × (½)ⁿ</text>
  <text x="680" y="443" text-anchor="start" font-size="11" fill="#a6adc8">n = t / t½</text>
  <text x="680" y="461" text-anchor="start" font-size="10" fill="#a6adc8">Activity unit: Becquerel (Bq)</text>

</svg>