<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="Arial, sans-serif">
  <rect width="960" height="480" fill="#1e1e2e" rx="12"/>
  <text x="480" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#cdd6f4">Genetics and Genetic Modification — IGCSE Biology</text>

  <!-- ══════ PUNNETT SQUARE ══════ -->
  <text x="140" y="56" text-anchor="middle" font-size="13" font-weight="bold" fill="#89b4fa">Monohybrid Cross (e.g. Height)</text>

  <!-- Parents -->
  <text x="60" y="82" font-size="11" fill="#a6adc8">Parents:</text>
  <rect x="100" y="70" width="70" height="26" rx="4" fill="#a6e3a1" fill-opacity="0.2" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="135" y="87" text-anchor="middle" font-size="11" fill="#a6e3a1">Tall (Tt)</text>
  <text x="185" y="84" text-anchor="middle" font-size="13" fill="#a6adc8">×</text>
  <rect x="200" y="70" width="70" height="26" rx="4" fill="#a6e3a1" fill-opacity="0.2" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="235" y="87" text-anchor="middle" font-size="11" fill="#a6e3a1">Tall (Tt)</text>

  <!-- Gametes -->
  <text x="60" y="115" font-size="11" fill="#a6adc8">Gametes:</text>
  <text x="130" y="115" text-anchor="middle" font-size="11" fill="#a6e3a1">T  t</text>
  <text x="220" y="115" text-anchor="middle" font-size="11" fill="#a6e3a1">T  t</text>

  <!-- Punnett square -->
  <text x="60" y="143" font-size="11" fill="#a6adc8">Punnett:</text>
  <rect x="100" y="130" width="165" height="140" rx="2" fill="none" stroke="#45475a" stroke-width="2"/>
  <!-- Grid lines -->
  <line x1="100" y1="165" x2="265" y2="165" stroke="#45475a" stroke-width="1"/>
  <line x1="100" y1="200" x2="265" y2="200" stroke="#45475a" stroke-width="1"/>
  <line x1="100" y1="235" x2="265" y2="235" stroke="#45475a" stroke-width="1"/>
  <line x1="155" y1="130" x2="155" y2="270" stroke="#45475a" stroke-width="1"/>
  <line x1="210" y1="130" x2="210" y2="270" stroke="#45475a" stroke-width="1"/>

  <!-- Headers -->
  <text x="125" y="152" text-anchor="middle" font-size="12" fill="#a6adc8"> </text>
  <text x="182" y="152" text-anchor="middle" font-size="12" fill="#89b4fa">T</text>
  <text x="237" y="152" text-anchor="middle" font-size="12" fill="#89b4fa">t</text>
  <text x="125" y="188" text-anchor="middle" font-size="12" fill="#89b4fa">T</text>
  <text x="125" y="222" text-anchor="middle" font-size="12" fill="#89b4fa">t</text>

  <!-- Cells -->
  <text x="182" y="188" text-anchor="middle" font-size="12" font-weight="bold" fill="#a6e3a1">TT</text>
  <text x="237" y="188" text-anchor="middle" font-size="12" font-weight="bold" fill="#a6e3a1">Tt</text>
  <text x="182" y="222" text-anchor="middle" font-size="12" font-weight="bold" fill="#a6e3a1">Tt</text>
  <text x="237" y="222" text-anchor="middle" font-size="12" font-weight="bold" fill="#f38ba8">tt</text>

  <!-- Results -->
  <rect x="100" y="285" width="165" height="75" rx="6" fill="#313244"/>
  <text x="182" y="302" text-anchor="middle" font-size="11" font-weight="bold" fill="#cdd6f4">Results</text>
  <text x="182" y="320" text-anchor="middle" font-size="11" fill="#a6e3a1">TT: Tt: tt = 1:2:1</text>
  <text x="182" y="335" text-anchor="middle" font-size="10" fill="#a6adc8">Phenotype: 3 Tall : 1 Short</text>
  <text x="182" y="350" text-anchor="middle" font-size="10" fill="#cba6f7">25% homozygous dominant</text>

  <!-- Key -->
  <rect x="100" y="370" width="165" height="75" rx="6" fill="#181825"/>
  <text x="182" y="388" text-anchor="middle" font-size="11" font-weight="bold" fill="#cdd6f4">Key Terms</text>
  <text x="110" y="404" font-size="10" fill="#a6e3a1">T = Tall (dominant)</text>
  <text x="110" y="418" font-size="10" fill="#f38ba8">t = short (recessive)</text>
  <text x="110" y="432" font-size="10" fill="#a6adc8">TT, Tt = Tall phenotype</text>
  <text x="110" y="446" font-size="10" fill="#f38ba8">tt = short phenotype</text>

  <!-- ══════ GENETIC MODIFICATION ══════ -->
  <text x="600" y="56" text-anchor="middle" font-size="13" font-weight="bold" fill="#f9e2af">Genetic Modification — Insulin Production</text>

  <!-- Step 1: Identify gene -->
  <rect x="310" y="68" width="150" height="50" rx="6" fill="#313244" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="385" y="88" text-anchor="middle" font-size="10" font-weight="bold" fill="#f9e2af">① Identify</text>
  <text x="385" y="103" text-anchor="middle" font-size="10" fill="#a6adc8">human insulin gene</text>
  <text x="385" y="115" text-anchor="middle" font-size="9" fill="#a6adc8">from human DNA</text>

  <!-- Step 2: Cut with restriction enzymes -->
  <rect x="310" y="140" width="150" height="55" rx="6" fill="#313244" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="385" y="160" text-anchor="middle" font-size="10" font-weight="bold" fill="#f38ba8">② Cut out</text>
  <text x="385" y="175" text-anchor="middle" font-size="10" fill="#a6adc8">Restriction enzyme</text>
  <text x="385" y="188" text-anchor="middle" font-size="10" fill="#a6adc8">creates sticky ends</text>

  <!-- Step 3: Cut plasmid -->
  <rect x="310" y="215" width="150" height="55" rx="6" fill="#313244" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="385" y="235" text-anchor="middle" font-size="10" font-weight="bold" fill="#cba6f7">③ Cut plasmid</text>
  <text x="385" y="250" text-anchor="middle" font-size="10" fill="#a6adc8">Same restriction</text>
  <text x="385" y="263" text-anchor="middle" font-size="10" fill="#a6adc8">enzyme → sticky ends</text>

  <!-- Step 4: Join -->
  <rect x="310" y="290" width="150" height="55" rx="6" fill="#313244" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="385" y="310" text-anchor="middle" font-size="10" font-weight="bold" fill="#a6e3a1">④ Join (ligate)</text>
  <text x="385" y="325" text-anchor="middle" font-size="10" fill="#a6adc8">DNA ligase seals</text>
  <text x="385" y="338" text-anchor="middle" font-size="10" fill="#cba6f7">Recombinant DNA formed</text>

  <!-- Step 5: Insert into bacteria -->
  <rect x="310" y="365" width="150" height="55" rx="6" fill="#313244" stroke="#fab387" stroke-width="1.5"/>
  <text x="385" y="385" text-anchor="middle" font-size="10" font-weight="bold" fill="#fab387">⑤ Insert into E. coli</text>
  <text x="385" y="400" text-anchor="middle" font-size="10" fill="#a6adc8">Bacteria transformed</text>
  <text x="385" y="413" text-anchor="middle" font-size="10" fill="#a6adc8">with recombinant plasmid</text>

  <!-- Arrows between steps -->
  <defs><marker id="arrD" markerWidth="7" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0,0 7,3 0,6" fill="#a6adc8"/></marker></defs>
  <line x1="385" y1="118" x2="385" y2="138" stroke="#a6adc8" stroke-width="1.5" marker-end="url(#arrD)"/>
  <line x1="385" y1="195" x2="385" y2="213" stroke="#a6adc8" stroke-width="1.5" marker-end="url(#arrD)"/>
  <line x1="385" y1="270" x2="385" y2="288" stroke="#a6adc8" stroke-width="1.5" marker-end="url(#arrD)"/>
  <line x1="385" y1="345" x2="385" y2="363" stroke="#a6adc8" stroke-width="1.5" marker-end="url(#arrD)"/>

  <!-- Diagrams on right side -->
  <!-- DNA molecule (human) -->
  <line x1="490" y1="80" x2="490" y2="110" stroke="#f9e2af" stroke-width="3"/>
  <line x1="505" y1="80" x2="505" y2="110" stroke="#f9e2af" stroke-width="3"/>
  <rect x="493" y="88" width="9" height="7" rx="1" fill="#89b4fa"/>
  <rect x="493" y="100" width="9" height="7" rx="1" fill="#a6e3a1"/>
  <text x="520" y="95" font-size="9" fill="#a6adc8">human DNA</text>
  <!-- Scissors icon -->
  <text x="490" y="130" font-size="14" fill="#f38ba8">✂</text>
  <text x="510" y="132" font-size="9" fill="#f38ba8">restriction</text>
  <text x="510" y="143" font-size="9" fill="#f38ba8">enzyme</text>

  <!-- Plasmid circle -->
  <circle cx="500" cy="235" r="28" fill="none" stroke="#cba6f7" stroke-width="2.5"/>
  <text x="500" y="238" text-anchor="middle" font-size="9" fill="#cba6f7">plasmid</text>
  <!-- Opening in plasmid -->
  <path d="M515,212 C530,218 530,252 515,258" fill="none" stroke="#1e1e2e" stroke-width="5"/>
  <path d="M515,212 C530,218 530,252 515,258" fill="none" stroke="#cba6f7" stroke-width="2"/>

  <!-- Recombinant plasmid -->
  <circle cx="500" cy="320" r="28" fill="none" stroke="#a6e3a1" stroke-width="2.5"/>
  <rect x="512" y="308" width="10" height="24" rx="3" fill="#f9e2af" fill-opacity="0.6"/>
  <text x="500" y="323" text-anchor="middle" font-size="8" fill="#a6e3a1">recombinant</text>
  <text x="500" y="335" text-anchor="middle" font-size="8" fill="#a6e3a1">plasmid</text>
  <text x="535" y="318" font-size="8" fill="#f9e2af">insulin</text>
  <text x="535" y="329" font-size="8" fill="#f9e2af">gene</text>

  <!-- E.coli with plasmid -->
  <ellipse cx="500" cy="400" rx="30" ry="22" fill="#fab387" fill-opacity="0.2" stroke="#fab387" stroke-width="2"/>
  <circle cx="500" cy="400" r="8" fill="#a6e3a1" fill-opacity="0.4" stroke="#a6e3a1" stroke-width="1"/>
  <text x="535" y="402" font-size="9" fill="#fab387">E. coli</text>

  <!-- Step 6: Fermenter -->
  <rect x="640" y="68" width="295" height="390" rx="8" fill="#181825"/>
  <text x="788" y="90" text-anchor="middle" font-size="12" font-weight="bold" fill="#fab387">⑥ Grow in fermenter</text>

  <!-- Fermenter vessel -->
  <rect x="680" y="100" width="200" height="230" rx="10" fill="#313244" stroke="#fab387" stroke-width="2"/>
  <!-- Bubbles -->
  <circle cx="720" cy="280" r="6" fill="#89b4fa" fill-opacity="0.4"/>
  <circle cx="755" cy="255" r="5" fill="#89b4fa" fill-opacity="0.4"/>
  <circle cx="790" cy="275" r="7" fill="#89b4fa" fill-opacity="0.4"/>
  <circle cx="830" cy="260" r="5" fill="#89b4fa" fill-opacity="0.4"/>
  <!-- Bacteria dots -->
  <ellipse cx="720" cy="220" rx="12" ry="8" fill="#fab387" fill-opacity="0.5"/>
  <ellipse cx="760" cy="200" rx="12" ry="8" fill="#fab387" fill-opacity="0.5"/>
  <ellipse cx="800" cy="215" rx="12" ry="8" fill="#fab387" fill-opacity="0.5"/>
  <ellipse cx="745" cy="245" rx="12" ry="8" fill="#fab387" fill-opacity="0.5"/>
  <ellipse cx="820" cy="240" rx="12" ry="8" fill="#fab387" fill-opacity="0.5"/>
  <text x="780" y="165" text-anchor="middle" font-size="10" fill="#fab387">E. coli replicates</text>
  <text x="780" y="180" text-anchor="middle" font-size="10" fill="#a6adc8">→ millions of bacteria</text>
  <text x="780" y="195" text-anchor="middle" font-size="10" fill="#a6adc8">→ insulin produced</text>

  <!-- Fermenter features -->
  <!-- Stirrer -->
  <line x1="780" y1="100" x2="780" y2="330" stroke="#6c7086" stroke-width="2"/>
  <line x1="760" y1="310" x2="800" y2="310" stroke="#6c7086" stroke-width="2"/>
  <!-- Water jacket -->
  <rect x="673" y="93" width="214" height="244" rx="12" fill="none" stroke="#89b4fa" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="890" y="160" font-size="9" fill="#89b4fa">water jacket</text>
  <text x="890" y="172" font-size="9" fill="#89b4fa">(temp control)</text>
  <!-- Air inlet -->
  <line x1="880" y1="280" x2="880" y2="260" stroke="#a6adc8" stroke-width="1.5"/>
  <text x="887" y="275" font-size="9" fill="#a6adc8">nutrients</text>

  <!-- Output -->
  <rect x="680" y="350" width="200" height="45" rx="6" fill="#a6e3a1" fill-opacity="0.15" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="780" y="370" text-anchor="middle" font-size="11" fill="#a6e3a1">Human Insulin</text>
  <text x="780" y="385" text-anchor="middle" font-size="10" fill="#a6adc8">extracted, purified, sold</text>

  <!-- Advantages box -->
  <rect x="645" y="410" width="280" height="55" rx="6" fill="#313244"/>
  <text x="785" y="427" text-anchor="middle" font-size="10" font-weight="bold" fill="#cdd6f4">Advantages over old pig insulin:</text>
  <text x="785" y="443" text-anchor="middle" font-size="9" fill="#a6adc8">✓ Identical to human insulin  ✓ Large-scale production</text>
  <text x="785" y="457" text-anchor="middle" font-size="9" fill="#a6adc8">✓ Cheaper  ✓ No animal welfare concerns</text>
</svg>
