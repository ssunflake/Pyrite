<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="Arial, sans-serif">
  <rect width="960" height="480" fill="#1e1e2e" rx="12"/>
  <text x="480" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#cdd6f4">Ecosystems — Food Webs and Energy Flow — IGCSE Biology</text>

  <!-- ══════ FOOD WEB ══════ -->
  <text x="210" y="56" text-anchor="middle" font-size="13" font-weight="bold" fill="#a6e3a1">Food Web (Grassland)</text>

  <!-- Producer level -->
  <rect x="140" y="390" width="80" height="35" rx="6" fill="#a6e3a1" fill-opacity="0.2" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="180" y="412" text-anchor="middle" font-size="11" fill="#a6e3a1">Grass</text>
  <rect x="260" y="390" width="80" height="35" rx="6" fill="#a6e3a1" fill-opacity="0.2" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="300" y="412" text-anchor="middle" font-size="11" fill="#a6e3a1">Berries</text>

  <!-- Primary consumers -->
  <rect x="60" y="300" width="80" height="35" rx="6" fill="#f9e2af" fill-opacity="0.2" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="100" y="322" text-anchor="middle" font-size="11" fill="#f9e2af">Rabbit</text>
  <rect x="170" y="300" width="80" height="35" rx="6" fill="#f9e2af" fill-opacity="0.2" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="210" y="322" text-anchor="middle" font-size="11" fill="#f9e2af">Mouse</text>
  <rect x="280" y="300" width="80" height="35" rx="6" fill="#f9e2af" fill-opacity="0.2" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="320" y="322" text-anchor="middle" font-size="11" fill="#f9e2af">Bird</text>

  <!-- Secondary consumers -->
  <rect x="60" y="210" width="80" height="35" rx="6" fill="#fab387" fill-opacity="0.2" stroke="#fab387" stroke-width="1.5"/>
  <text x="100" y="232" text-anchor="middle" font-size="11" fill="#fab387">Fox</text>
  <rect x="250" y="210" width="80" height="35" rx="6" fill="#fab387" fill-opacity="0.2" stroke="#fab387" stroke-width="1.5"/>
  <text x="290" y="232" text-anchor="middle" font-size="11" fill="#fab387">Snake</text>

  <!-- Tertiary consumer -->
  <rect x="145" y="120" width="100" height="35" rx="6" fill="#f38ba8" fill-opacity="0.2" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="195" y="142" text-anchor="middle" font-size="11" fill="#f38ba8">Eagle</text>

  <!-- Arrows (eaten by) -->
  <defs>
    <marker id="aE" markerWidth="7" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0,0 7,3 0,6" fill="#a6adc8"/></marker>
  </defs>
  <line x1="175" y1="390" x2="105" y2="335" stroke="#a6adc8" stroke-width="1.5" marker-end="url(#aE)"/>
  <line x1="185" y1="390" x2="210" y2="335" stroke="#a6adc8" stroke-width="1.5" marker-end="url(#aE)"/>
  <line x1="300" y1="390" x2="315" y2="335" stroke="#a6adc8" stroke-width="1.5" marker-end="url(#aE)"/>
  <line x1="295" y1="390" x2="215" y2="335" stroke="#a6adc8" stroke-width="1.5" marker-end="url(#aE)"/>
  <line x1="100" y1="300" x2="100" y2="245" stroke="#a6adc8" stroke-width="1.5" marker-end="url(#aE)"/>
  <line x1="115" y1="300" x2="265" y2="245" stroke="#a6adc8" stroke-width="1.5" marker-end="url(#aE)"/>
  <line x1="215" y1="300" x2="110" y2="245" stroke="#a6adc8" stroke-width="1.5" marker-end="url(#aE)"/>
  <line x1="225" y1="300" x2="270" y2="245" stroke="#a6adc8" stroke-width="1.5" marker-end="url(#aE)"/>
  <line x1="315" y1="300" x2="285" y2="245" stroke="#a6adc8" stroke-width="1.5" marker-end="url(#aE)"/>
  <line x1="110" y1="210" x2="175" y2="155" stroke="#a6adc8" stroke-width="1.5" marker-end="url(#aE)"/>
  <line x1="270" y1="210" x2="225" y2="155" stroke="#a6adc8" stroke-width="1.5" marker-end="url(#aE)"/>
  <line x1="310" y1="210" x2="230" y2="155" stroke="#a6adc8" stroke-width="1.5" marker-end="url(#aE)"/>

  <!-- Trophic level labels -->
  <text x="390" y="412" font-size="10" fill="#a6e3a1">Trophic level 1</text>
  <text x="390" y="424" font-size="9" fill="#a6adc8">(producers)</text>
  <text x="390" y="320" font-size="10" fill="#f9e2af">Trophic level 2</text>
  <text x="390" y="332" font-size="9" fill="#a6adc8">(primary consumers)</text>
  <text x="390" y="228" font-size="10" fill="#fab387">Trophic level 3</text>
  <text x="390" y="240" font-size="9" fill="#a6adc8">(secondary consumers)</text>
  <text x="390" y="142" font-size="10" fill="#f38ba8">Trophic level 4</text>
  <text x="390" y="154" font-size="9" fill="#a6adc8">(tertiary consumer)</text>

  <!-- Energy arrow (left side) -->
  <line x1="30" y1="425" x2="30" y2="100" stroke="#f9e2af" stroke-width="2.5" marker-end="url(#aE)"/>
  <text x="18" y="270" text-anchor="middle" font-size="10" fill="#f9e2af" transform="rotate(-90,18,270)">energy flow</text>

  <!-- ══════ PYRAMID OF BIOMASS / ENERGY ══════ -->
  <text x="620" y="56" text-anchor="middle" font-size="13" font-weight="bold" fill="#cdd6f4">Pyramid of Biomass / Energy</text>

  <!-- Pyramid tiers -->
  <!-- Producer (wide base) -->
  <rect x="455" y="380" width="330" height="40" rx="4" fill="#a6e3a1" fill-opacity="0.4" stroke="#a6e3a1" stroke-width="2"/>
  <text x="620" y="405" text-anchor="middle" font-size="12" fill="#1e1e2e" font-weight="bold">Producers (grass)</text>
  <text x="798" y="405" text-anchor="start" font-size="10" fill="#a6e3a1">~10,000 kJ</text>

  <!-- Primary consumer -->
  <rect x="488" y="325" width="264" height="40" rx="4" fill="#f9e2af" fill-opacity="0.4" stroke="#f9e2af" stroke-width="2"/>
  <text x="620" y="350" text-anchor="middle" font-size="12" fill="#1e1e2e" font-weight="bold">Primary consumers</text>
  <text x="760" y="350" text-anchor="start" font-size="10" fill="#f9e2af">~1,000 kJ</text>

  <!-- Secondary consumer -->
  <rect x="522" y="270" width="196" height="40" rx="4" fill="#fab387" fill-opacity="0.4" stroke="#fab387" stroke-width="2"/>
  <text x="620" y="295" text-anchor="middle" font-size="12" fill="#1e1e2e" font-weight="bold">Secondary consumers</text>
  <text x="726" y="295" text-anchor="start" font-size="10" fill="#fab387">~100 kJ</text>

  <!-- Tertiary -->
  <rect x="556" y="215" width="128" height="40" rx="4" fill="#f38ba8" fill-opacity="0.4" stroke="#f38ba8" stroke-width="2"/>
  <text x="620" y="240" text-anchor="middle" font-size="11" fill="#1e1e2e" font-weight="bold">Tertiary consumers</text>
  <text x="692" y="240" text-anchor="start" font-size="10" fill="#f38ba8">~10 kJ</text>

  <!-- ══════ ENERGY LOSS BOX ══════ -->
  <rect x="455" y="90" width="330" height="115" rx="8" fill="#181825"/>
  <text x="620" y="110" text-anchor="middle" font-size="12" font-weight="bold" fill="#cdd6f4">Why ~90% Energy is Lost</text>
  <text x="465" y="132" font-size="10" fill="#f38ba8">🔥 Heat from respiration (most)</text>
  <text x="465" y="148" font-size="10" fill="#a6adc8">💩 Faeces — undigested food</text>
  <text x="465" y="164" font-size="10" fill="#a6adc8">🏃 Movement — kinetic energy</text>
  <text x="465" y="180" font-size="10" fill="#a6adc8">🌿 Uneaten parts (roots, bones)</text>
  <text x="620" y="198" text-anchor="middle" font-size="10" fill="#f9e2af">Only ~10% transferred to next level</text>

  <!-- Efficiency formula -->
  <rect x="455" y="165" width="330" height="30" rx="4" fill="#313244"/>
  <text x="620" y="184" text-anchor="middle" font-size="11" fill="#f9e2af">Efficiency = (energy next level / energy current level) × 100%</text>

  <!-- Food chain below pyramid -->
  <rect x="455" y="425" width="330" height="40" rx="6" fill="#313244"/>
  <text x="620" y="443" text-anchor="middle" font-size="10" fill="#a6adc8">Shorter food chains = more efficient energy use</text>
  <text x="620" y="458" text-anchor="middle" font-size="10" fill="#a6e3a1">Humans eating plants directly is more energy-efficient than eating animals</text>
</svg>
