<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 440" font-family="Arial, sans-serif">
  <rect width="960" height="440" fill="#1e1e2e" rx="12"/>
  <text x="480" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#cdd6f4">Enzyme Activity — IGCSE Biology</text>

  <!-- ══════ TEMPERATURE GRAPH ══════ -->
  <text x="150" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#89b4fa">Effect of Temperature</text>
  <!-- Axes -->
  <line x1="40" y1="340" x2="40" y2="75" stroke="#6c7086" stroke-width="2"/>
  <line x1="40" y1="340" x2="290" y2="340" stroke="#6c7086" stroke-width="2"/>
  <text x="165" y="370" text-anchor="middle" font-size="11" fill="#a6adc8">Temperature (°C)</text>
  <text x="12" y="210" text-anchor="middle" font-size="11" fill="#a6adc8" transform="rotate(-90,12,210)">Rate of reaction</text>
  <!-- Arrow heads -->
  <polygon points="40,73 35,85 45,85" fill="#6c7086"/>
  <polygon points="292,340 280,335 280,345" fill="#6c7086"/>

  <!-- Curve: rises, peaks at 37, sharp drop -->
  <path d="M50,330 C70,320 90,290 110,240 C125,200 138,150 158,110 C168,90 175,82 185,82 C195,82 200,88 210,105 C225,135 240,210 260,295 C270,320 278,333 285,338"
        stroke="#89b4fa" stroke-width="3" fill="none"/>

  <!-- Optimum marker -->
  <line x1="185" y1="82" x2="185" y2="340" stroke="#f9e2af" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="185" y="355" text-anchor="middle" font-size="11" fill="#f9e2af">37°C</text>
  <text x="185" y="368" text-anchor="middle" font-size="10" fill="#f9e2af">(human optimum)</text>

  <!-- Labels on curve -->
  <text x="80" y="275" font-size="10" fill="#a6e3a1">more KE</text>
  <text x="80" y="287" font-size="10" fill="#a6e3a1">→ faster</text>
  <text x="220" y="200" font-size="10" fill="#f38ba8">denaturation</text>
  <text x="220" y="212" font-size="10" fill="#f38ba8">above optimum</text>

  <!-- Denaturation X -->
  <text x="255" y="285" font-size="18" fill="#f38ba8">✕</text>

  <!-- ══════ pH GRAPH ══════ -->
  <text x="490" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#a6e3a1">Effect of pH</text>
  <line x1="370" y1="340" x2="370" y2="75" stroke="#6c7086" stroke-width="2"/>
  <line x1="370" y1="340" x2="620" y2="340" stroke="#6c7086" stroke-width="2"/>
  <text x="495" y="370" text-anchor="middle" font-size="11" fill="#a6adc8">pH</text>
  <text x="342" y="210" text-anchor="middle" font-size="11" fill="#a6adc8" transform="rotate(-90,342,210)">Rate of reaction</text>
  <polygon points="370,73 365,85 375,85" fill="#6c7086"/>
  <polygon points="622,340 610,335 610,345" fill="#6c7086"/>

  <!-- pH axis labels -->
  <text x="375" y="355" font-size="10" fill="#a6adc8">2</text>
  <text x="415" y="355" font-size="10" fill="#a6adc8">4</text>
  <text x="455" y="355" font-size="10" fill="#a6adc8">6</text>
  <text x="490" y="355" font-size="10" fill="#a6adc8">7</text>
  <text x="530" y="355" font-size="10" fill="#a6adc8">9</text>
  <text x="568" y="355" font-size="10" fill="#a6adc8">11</text>

  <!-- Pepsin (pH 2) curve — narrow peak at left -->
  <path d="M375,335 C380,330 385,300 390,250 C395,200 398,140 402,110 C406,82 408,82 412,95 C418,120 425,200 435,280 C440,310 445,330 450,335"
        stroke="#f38ba8" stroke-width="2.5" fill="none"/>
  <text x="400" y="99" text-anchor="middle" font-size="10" fill="#f38ba8">pepsin</text>
  <text x="400" y="111" text-anchor="middle" font-size="10" fill="#f38ba8">(pH ~2)</text>

  <!-- Amylase (pH 7) curve -->
  <path d="M430,335 C445,310 460,270 475,220 C488,175 492,130 497,105 C502,82 507,82 512,95 C520,125 535,195 550,260 C560,300 570,325 580,335"
        stroke="#a6e3a1" stroke-width="2.5" fill="none"/>
  <text x="508" y="96" text-anchor="middle" font-size="10" fill="#a6e3a1">amylase</text>
  <text x="508" y="108" text-anchor="middle" font-size="10" fill="#a6e3a1">(pH ~7)</text>

  <!-- Trypsin (pH 8) curve -->
  <path d="M510,335 C520,320 535,280 550,230 C560,190 565,150 568,120 C572,95 574,82 578,95 C582,115 588,170 595,230 C600,270 606,310 612,335"
        stroke="#89b4fa" stroke-width="2" fill="none" stroke-dasharray="5,3"/>
  <text x="582" y="108" text-anchor="middle" font-size="10" fill="#89b4fa">trypsin</text>
  <text x="582" y="120" text-anchor="middle" font-size="10" fill="#89b4fa">(pH ~8)</text>

  <!-- ══════ SUBSTRATE CONCENTRATION GRAPH ══════ -->
  <text x="800" y="58" text-anchor="middle" font-size="13" font-weight="bold" fill="#fab387">Effect of Substrate Concentration</text>
  <line x1="680" y1="340" x2="680" y2="75" stroke="#6c7086" stroke-width="2"/>
  <line x1="680" y1="340" x2="940" y2="340" stroke="#6c7086" stroke-width="2"/>
  <text x="810" y="370" text-anchor="middle" font-size="11" fill="#a6adc8">Substrate concentration</text>
  <text x="652" y="210" text-anchor="middle" font-size="11" fill="#a6adc8" transform="rotate(-90,652,210)">Rate of reaction</text>
  <polygon points="680,73 675,85 685,85" fill="#6c7086"/>
  <polygon points="942,340 930,335 930,345" fill="#6c7086"/>

  <!-- Curve: rises steeply, plateaus -->
  <path d="M685,335 C695,315 710,275 730,225 C750,175 775,135 800,110 C815,96 830,88 850,85 C870,83 890,83 920,83"
        stroke="#fab387" stroke-width="3" fill="none"/>

  <!-- Plateau label -->
  <line x1="848" y1="85" x2="848" y2="340" stroke="#a6adc8" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="860" y="165" font-size="10" fill="#a6adc8">plateau —</text>
  <text x="860" y="177" font-size="10" fill="#a6adc8">all active</text>
  <text x="860" y="189" font-size="10" fill="#a6adc8">sites full</text>
  <text x="860" y="201" font-size="10" fill="#a6adc8">(saturation)</text>

  <!-- Rising label -->
  <text x="700" y="270" font-size="10" fill="#fab387">more</text>
  <text x="700" y="282" font-size="10" fill="#fab387">E-S complexes</text>
  <text x="700" y="294" font-size="10" fill="#fab387">→ faster rate</text>

  <!-- Lock and key inset -->
  <rect x="680" y="80" width="155" height="88" rx="6" fill="#313244"/>
  <text x="757" y="97" text-anchor="middle" font-size="10" font-weight="bold" fill="#cdd6f4">Lock and Key Model</text>
  <!-- Enzyme shape -->
  <path d="M695,140 L695,115 L730,115 L730,125 L720,125 L720,115" stroke="#fab387" stroke-width="2" fill="none"/>
  <text x="712" y="155" text-anchor="middle" font-size="9" fill="#fab387">active site</text>
  <!-- Substrate -->
  <rect x="722" y="108" width="14" height="16" rx="2" fill="#a6e3a1" fill-opacity="0.7"/>
  <text x="745" y="118" font-size="9" fill="#a6e3a1">substrate</text>
  <!-- Arrow to complex -->
  <text x="755" y="130" font-size="14" fill="#cdd6f4">→</text>
  <!-- Complex -->
  <path d="M775,140 L775,110 L815,110 L815,125 L800,125 L800,110" stroke="#fab387" stroke-width="2" fill="none"/>
  <rect x="800" y="108" width="14" height="16" rx="2" fill="#a6e3a1" fill-opacity="0.7"/>
  <text x="795" y="155" text-anchor="middle" font-size="9" fill="#cdd6f4">E-S complex</text>

  <!-- Bottom summary -->
  <rect x="20" y="390" width="920" height="40" rx="6" fill="#181825"/>
  <text x="480" y="408" text-anchor="middle" font-size="11" fill="#cdd6f4">Above optimum temp → enzyme <tspan fill="#f38ba8">denatures</tspan> (irreversible) | Wrong pH → active site shape changes | Substrate saturation → all active sites occupied</text>
  <text x="480" y="424" text-anchor="middle" font-size="10" fill="#a6adc8">Denaturation = permanent loss of 3D shape — enzyme cannot function again</text>
</svg>
