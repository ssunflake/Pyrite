<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="Arial, sans-serif">
  <rect width="960" height="480" fill="#1e1e2e" rx="12"/>
  <text x="480" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#cdd6f4">Movement into and out of Cells — IGCSE Biology</text>

  <!-- ══════ DIFFUSION ══════ -->
  <text x="160" y="58" text-anchor="middle" font-size="14" font-weight="bold" fill="#89b4fa">Diffusion</text>
  <rect x="20" y="68" width="290" height="200" rx="8" fill="#181825"/>

  <!-- High concentration side -->
  <rect x="20" y="68" width="130" height="200" rx="8" fill="#89b4fa" fill-opacity="0.08"/>
  <text x="85" y="88" text-anchor="middle" font-size="10" fill="#89b4fa">HIGH concentration</text>
  <!-- Many dots -->
  <circle cx="40" cy="105" r="7" fill="#89b4fa" fill-opacity="0.7"/>
  <circle cx="65" cy="118" r="7" fill="#89b4fa" fill-opacity="0.7"/>
  <circle cx="90" cy="100" r="7" fill="#89b4fa" fill-opacity="0.7"/>
  <circle cx="115" cy="120" r="7" fill="#89b4fa" fill-opacity="0.7"/>
  <circle cx="50" cy="140" r="7" fill="#89b4fa" fill-opacity="0.7"/>
  <circle cx="80" cy="155" r="7" fill="#89b4fa" fill-opacity="0.7"/>
  <circle cx="110" cy="145" r="7" fill="#89b4fa" fill-opacity="0.7"/>
  <circle cx="45" cy="175" r="7" fill="#89b4fa" fill-opacity="0.7"/>
  <circle cx="100" cy="182" r="7" fill="#89b4fa" fill-opacity="0.7"/>
  <circle cx="70" cy="200" r="7" fill="#89b4fa" fill-opacity="0.7"/>
  <circle cx="120" cy="215" r="7" fill="#89b4fa" fill-opacity="0.7"/>
  <circle cx="48" cy="228" r="7" fill="#89b4fa" fill-opacity="0.7"/>

  <!-- Membrane line -->
  <line x1="150" y1="68" x2="150" y2="268" stroke="#f9e2af" stroke-width="3"/>
  <text x="150" y="282" text-anchor="middle" font-size="10" fill="#f9e2af">membrane</text>

  <!-- Low concentration side -->
  <text x="235" y="88" text-anchor="middle" font-size="10" fill="#89b4fa">LOW concentration</text>
  <circle cx="175" cy="120" r="7" fill="#89b4fa" fill-opacity="0.7"/>
  <circle cx="220" cy="155" r="7" fill="#89b4fa" fill-opacity="0.7"/>
  <circle cx="280" cy="130" r="7" fill="#89b4fa" fill-opacity="0.7"/>
  <circle cx="200" cy="195" r="7" fill="#89b4fa" fill-opacity="0.7"/>

  <!-- Big net arrow -->
  <defs>
    <marker id="arrBig" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#89b4fa"/>
    </marker>
    <marker id="arrBigG" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#a6e3a1"/>
    </marker>
    <marker id="arrBigR" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#f38ba8"/>
    </marker>
    <marker id="arrBigY" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#f9e2af"/>
    </marker>
    <marker id="arrSm" markerWidth="7" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 7,3 0,6" fill="#89b4fa"/>
    </marker>
    <marker id="arrSmR" markerWidth="7" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 7,3 0,6" fill="#f38ba8"/>
    </marker>
    <marker id="arrSmG" markerWidth="7" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 7,3 0,6" fill="#a6e3a1"/>
    </marker>
    <marker id="arrSmY" markerWidth="7" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 7,3 0,6" fill="#f9e2af"/>
    </marker>
  </defs>
  <line x1="150" y1="170" x2="290" y2="170" stroke="#89b4fa" stroke-width="3" marker-end="url(#arrBig)"/>
  <text x="155" y="162" font-size="11" fill="#89b4fa" font-weight="bold">NET movement</text>

  <!-- Diffusion info box -->
  <rect x="20" y="285" width="290" height="80" rx="6" fill="#313244"/>
  <text x="165" y="302" text-anchor="middle" font-size="12" font-weight="bold" fill="#cdd6f4">Diffusion</text>
  <text x="165" y="320" text-anchor="middle" font-size="10" fill="#a6adc8">Net movement: HIGH → LOW conc.</text>
  <text x="165" y="335" text-anchor="middle" font-size="10" fill="#a6adc8">Passive — NO energy (ATP) needed</text>
  <text x="165" y="350" text-anchor="middle" font-size="10" fill="#a6e3a1">e.g. O₂ into cells, CO₂ out of cells</text>

  <!-- ══════ OSMOSIS ══════ -->
  <text x="480" y="58" text-anchor="middle" font-size="14" font-weight="bold" fill="#a6e3a1">Osmosis</text>
  <rect x="330" y="68" width="300" height="200" rx="8" fill="#181825"/>

  <!-- Partially permeable membrane (double line) -->
  <line x1="480" y1="68" x2="480" y2="268" stroke="#f9e2af" stroke-width="2"/>
  <line x1="486" y1="68" x2="486" y2="268" stroke="#f9e2af" stroke-width="2"/>
  <text x="480" y="282" text-anchor="middle" font-size="10" fill="#f9e2af">partially permeable membrane</text>

  <!-- Left side: high water potential (dilute) -->
  <rect x="330" y="68" width="148" height="200" rx="8" fill="#a6e3a1" fill-opacity="0.06"/>
  <text x="405" y="86" text-anchor="middle" font-size="10" fill="#a6e3a1">Dilute solution</text>
  <text x="405" y="98" text-anchor="middle" font-size="10" fill="#a6e3a1">HIGH water potential</text>
  <!-- Water molecules (O) many -->
  <text x="345" y="120" font-size="14" fill="#a6e3a1" fill-opacity="0.8">💧💧💧</text>
  <text x="345" y="145" font-size="14" fill="#a6e3a1" fill-opacity="0.8">💧💧💧</text>
  <text x="350" y="170" font-size="14" fill="#a6e3a1" fill-opacity="0.8">💧💧</text>
  <!-- Solute dots (few) -->
  <circle cx="360" cy="195" r="6" fill="#fab387" fill-opacity="0.7"/>
  <circle cx="435" cy="210" r="6" fill="#fab387" fill-opacity="0.7"/>

  <!-- Right side: low water potential (concentrated) -->
  <rect x="488" y="68" width="142" height="200" fill="#a6e3a1" fill-opacity="0.03"/>
  <text x="558" y="86" text-anchor="middle" font-size="10" fill="#f38ba8">Concentrated solution</text>
  <text x="558" y="98" text-anchor="middle" font-size="10" fill="#f38ba8">LOW water potential</text>
  <!-- Fewer water, more solute -->
  <text x="498" y="120" font-size="14" fill="#a6e3a1" fill-opacity="0.5">💧</text>
  <text x="530" y="140" font-size="14" fill="#a6e3a1" fill-opacity="0.5">💧</text>
  <!-- Many solute -->
  <circle cx="505" cy="160" r="6" fill="#fab387" fill-opacity="0.8"/>
  <circle cx="530" cy="175" r="6" fill="#fab387" fill-opacity="0.8"/>
  <circle cx="555" cy="155" r="6" fill="#fab387" fill-opacity="0.8"/>
  <circle cx="580" cy="180" r="6" fill="#fab387" fill-opacity="0.8"/>
  <circle cx="510" cy="200" r="6" fill="#fab387" fill-opacity="0.8"/>
  <circle cx="600" cy="170" r="6" fill="#fab387" fill-opacity="0.8"/>
  <circle cx="570" cy="210" r="6" fill="#fab387" fill-opacity="0.8"/>
  <circle cx="540" cy="220" r="6" fill="#fab387" fill-opacity="0.8"/>

  <!-- Net arrow: water moves right -->
  <line x1="350" y1="170" x2="470" y2="170" stroke="#a6e3a1" stroke-width="3" marker-end="url(#arrBigG)"/>
  <text x="380" y="162" font-size="11" fill="#a6e3a1" font-weight="bold">water moves</text>

  <!-- Osmosis box -->
  <rect x="330" y="285" width="300" height="80" rx="6" fill="#313244"/>
  <text x="480" y="302" text-anchor="middle" font-size="12" font-weight="bold" fill="#cdd6f4">Osmosis</text>
  <text x="480" y="320" text-anchor="middle" font-size="10" fill="#a6adc8">Water moves: HIGH → LOW water potential</text>
  <text x="480" y="335" text-anchor="middle" font-size="10" fill="#a6adc8">Through partially permeable membrane</text>
  <text x="480" y="350" text-anchor="middle" font-size="10" fill="#a6e3a1">Passive — NO energy needed</text>

  <!-- ══════ ACTIVE TRANSPORT ══════ -->
  <text x="800" y="58" text-anchor="middle" font-size="14" font-weight="bold" fill="#f38ba8">Active Transport</text>
  <rect x="650" y="68" width="290" height="200" rx="8" fill="#181825"/>

  <!-- Membrane -->
  <line x1="795" y1="68" x2="795" y2="268" stroke="#f9e2af" stroke-width="3"/>

  <!-- Left: low concentration -->
  <text x="725" y="86" text-anchor="middle" font-size="10" fill="#a6adc8">LOW concentration</text>
  <circle cx="668" cy="115" r="7" fill="#f38ba8" fill-opacity="0.6"/>
  <circle cx="700" cy="140" r="7" fill="#f38ba8" fill-opacity="0.6"/>
  <circle cx="665" cy="170" r="7" fill="#f38ba8" fill-opacity="0.6"/>
  <circle cx="740" cy="160" r="7" fill="#f38ba8" fill-opacity="0.6"/>

  <!-- Right: high concentration -->
  <text x="870" y="86" text-anchor="middle" font-size="10" fill="#f38ba8">HIGH concentration</text>
  <circle cx="815" cy="105" r="7" fill="#f38ba8" fill-opacity="0.8"/>
  <circle cx="840" cy="125" r="7" fill="#f38ba8" fill-opacity="0.8"/>
  <circle cx="870" cy="108" r="7" fill="#f38ba8" fill-opacity="0.8"/>
  <circle cx="895" cy="130" r="7" fill="#f38ba8" fill-opacity="0.8"/>
  <circle cx="820" cy="155" r="7" fill="#f38ba8" fill-opacity="0.8"/>
  <circle cx="855" cy="170" r="7" fill="#f38ba8" fill-opacity="0.8"/>
  <circle cx="890" cy="155" r="7" fill="#f38ba8" fill-opacity="0.8"/>
  <circle cx="825" cy="195" r="7" fill="#f38ba8" fill-opacity="0.8"/>
  <circle cx="870" cy="195" r="7" fill="#f38ba8" fill-opacity="0.8"/>

  <!-- Carrier protein in membrane -->
  <rect x="783" y="130" width="24" height="50" rx="8" fill="#cba6f7" fill-opacity="0.7" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="795" y="170" text-anchor="middle" font-size="9" fill="#1e1e2e">carrier</text>

  <!-- Arrow AGAINST gradient -->
  <line x1="650" y1="175" x2="775" y2="175" stroke="#f38ba8" stroke-width="3" marker-end="url(#arrBigR)"/>
  <text x="660" y="168" font-size="9" fill="#f38ba8">against gradient!</text>

  <!-- ATP bolt -->
  <text x="710" y="210" text-anchor="middle" font-size="20" fill="#f9e2af">⚡</text>
  <text x="710" y="228" text-anchor="middle" font-size="11" fill="#f9e2af">ATP needed</text>

  <!-- AT box -->
  <rect x="650" y="285" width="290" height="80" rx="6" fill="#313244"/>
  <text x="795" y="302" text-anchor="middle" font-size="12" font-weight="bold" fill="#cdd6f4">Active Transport</text>
  <text x="795" y="320" text-anchor="middle" font-size="10" fill="#a6adc8">LOW → HIGH concentration (against gradient)</text>
  <text x="795" y="335" text-anchor="middle" font-size="10" fill="#a6adc8">Uses ATP + carrier proteins in membrane</text>
  <text x="795" y="350" text-anchor="middle" font-size="10" fill="#f38ba8">e.g. mineral ions into root hair cells</text>

  <!-- Bottom comparison -->
  <rect x="20" y="385" width="920" height="82" rx="8" fill="#181825"/>
  <text x="480" y="403" text-anchor="middle" font-size="12" font-weight="bold" fill="#cdd6f4">Comparison</text>
  <text x="150" y="422" text-anchor="middle" font-size="11" fill="#89b4fa">Diffusion</text>
  <text x="150" y="437" text-anchor="middle" font-size="10" fill="#a6adc8">High → Low</text>
  <text x="150" y="450" text-anchor="middle" font-size="10" fill="#a6adc8">No ATP | No carrier</text>
  <text x="150" y="463" text-anchor="middle" font-size="10" fill="#a6adc8">Any molecule</text>
  <line x1="290" y1="390" x2="290" y2="462" stroke="#313244" stroke-width="1"/>
  <text x="480" y="422" text-anchor="middle" font-size="11" fill="#a6e3a1">Osmosis</text>
  <text x="480" y="437" text-anchor="middle" font-size="10" fill="#a6adc8">High → Low water potential</text>
  <text x="480" y="450" text-anchor="middle" font-size="10" fill="#a6adc8">No ATP | Part. perm. membrane</text>
  <text x="480" y="463" text-anchor="middle" font-size="10" fill="#a6adc8">Water only</text>
  <line x1="670" y1="390" x2="670" y2="462" stroke="#313244" stroke-width="1"/>
  <text x="810" y="422" text-anchor="middle" font-size="11" fill="#f38ba8">Active Transport</text>
  <text x="810" y="437" text-anchor="middle" font-size="10" fill="#a6adc8">Low → High (AGAINST gradient)</text>
  <text x="810" y="450" text-anchor="middle" font-size="10" fill="#a6adc8">ATP required | Carrier proteins</text>
  <text x="810" y="463" text-anchor="middle" font-size="10" fill="#a6adc8">Specific molecules/ions</text>
</svg>
